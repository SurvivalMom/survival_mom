<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>こころの観察 — Emotional Resilience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1A1714;--surface:#211E1B;--surface2:#272420;
  --cream:#FAF7F2;--warm:#E8E0D5;--warm-mid:#C8BEB4;
  --stone:#8A847D;--stone-light:#A8A09A;
  --terra:#B87355;--terra-light:#D4956A;
  --sage:#7A9E8E;
  --border:rgba(138,132,125,0.18);
}
html,body{height:100%;background:var(--bg);color:var(--cream);font-family:'Noto Serif JP',serif;font-weight:300;overflow-x:hidden}
body{display:flex;justify-content:center}
#app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.45;transform:scale(0.8)}}
@keyframes breathIn{0%{transform:scale(1);opacity:0.55}100%{transform:scale(1.5);opacity:1}}
@keyframes breathHold{0%,100%{transform:scale(1.5)}}
@keyframes breathOut{0%{transform:scale(1.5);opacity:1}100%{transform:scale(1);opacity:0.55}}

/* FLASH OVERLAYS */
.flash-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(12,10,8,0.97);pointer-events:none;animation:fadeIn 0.3s ease}
.flash-center{text-align:center;padding:48px 32px}

/* HEADER */
.header{background:linear-gradient(180deg,rgba(33,30,27,0.98),rgba(33,30,27,0.9));padding:16px 20px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.header-label{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.32em;color:var(--stone);text-transform:uppercase;margin-bottom:2px}
.header-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--cream);letter-spacing:0.06em}
.emergency-btn{background:rgba(196,112,112,0.1);border:1px solid rgba(196,112,112,0.4);border-radius:2px;color:#E8A0A0;font-family:'Noto Serif JP',serif;font-size:10px;font-weight:300;letter-spacing:0.08em;padding:7px 11px;cursor:pointer;white-space:nowrap;transition:all 0.2s}
/* ①: 診断コンテキスト日次メッセージ */
.diag-daily{font-size:11px;color:var(--terra-light);letter-spacing:0.1em;margin:5px 0 6px;font-style:italic;font-family:'Cormorant Garamond',serif}
.header-purpose{font-size:11px;color:var(--stone-light);letter-spacing:0.12em;margin-bottom:8px}
.streak-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(122,158,142,0.1);border:1px solid rgba(122,158,142,0.2);border-radius:20px;padding:4px 12px;font-size:10px;color:var(--sage);letter-spacing:0.1em;margin-bottom:8px}
.streak-dot{width:5px;height:5px;border-radius:50%;background:var(--sage)}
.margin-meter-row{display:flex;justify-content:space-between;font-size:10px;letter-spacing:0.12em;margin-bottom:4px}
.margin-track{height:3px;background:rgba(138,132,125,0.2);border-radius:2px;overflow:hidden;margin-bottom:8px}
.margin-fill{height:100%;border-radius:2px;transition:width 0.6s ease}
.predict-card{border-radius:4px;padding:12px 14px;animation:fadeUp 0.4s ease}
.predict-card.active{background:rgba(184,115,85,0.07);border:1px solid rgba(184,115,85,0.3)}
.predict-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.28em;color:var(--stone);text-transform:uppercase}
.predict-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.predict-conf{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.18em}
.predict-alert{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.predict-dot{width:7px;height:7px;border-radius:50%;background:var(--terra);flex-shrink:0;animation:pulse 2s infinite}
.predict-alert-text{font-size:13px;font-weight:300;letter-spacing:0.04em}
.predict-alert-text strong{color:var(--terra-light)}
.predict-detail{font-size:11px;color:var(--stone-light);line-height:1.85;margin-bottom:8px;letter-spacing:0.04em}
.predict-action{background:none;border:1px solid rgba(184,115,85,0.4);border-radius:2px;color:var(--terra-light);font-family:'Noto Serif JP',serif;font-size:11px;font-weight:300;letter-spacing:0.08em;padding:6px 12px;cursor:pointer}

/* CONTENT */
.content{padding:20px 20px 110px}
.section-label{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.32em;color:var(--stone);text-transform:uppercase;margin-bottom:14px}
.divider{height:1px;background:var(--border);margin:16px 0}

/* WELCOME RETURN CARD ① */
.welcome-return-card{background:rgba(122,158,142,0.06);border:1px solid rgba(122,158,142,0.2);border-radius:4px;padding:14px 16px;margin-bottom:16px;animation:fadeUp 0.4s ease;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.welcome-return-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.28em;color:var(--sage);text-transform:uppercase;margin-bottom:6px}
.welcome-return-line{font-size:12px;font-weight:300;color:var(--warm-mid);line-height:1.9;letter-spacing:0.05em}
.welcome-return-close{background:none;border:none;color:var(--stone);font-size:16px;cursor:pointer;flex-shrink:0}

/* GATEWAY */
.gateway-wrap{animation:fadeUp 0.3s ease}
.gateway-q{font-size:16px;font-weight:300;color:var(--cream);letter-spacing:0.06em;margin-bottom:4px;text-align:center}
.gateway-sub{font-size:11px;color:var(--stone);letter-spacing:0.08em;margin-bottom:14px;text-align:center}
.gateway-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.gateway-btn{background:rgba(250,247,242,0.03);border:1px solid var(--border);border-radius:4px;padding:11px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all 0.2s}
.gateway-btn:active{background:rgba(184,115,85,0.1);border-color:rgba(184,115,85,0.4)}
.gateway-emoji{font-size:22px;line-height:1}
.gateway-label{font-size:11px;color:var(--warm-mid);letter-spacing:0.04em;text-align:center}
.gateway-detail{background:none;border:none;color:var(--stone);font-family:'Noto Serif JP',serif;font-size:11px;cursor:pointer;letter-spacing:0.08em;display:block;margin:0 auto;text-decoration:underline;text-underline-offset:3px}

/* GATEWAY MIRROR */
.gateway-mirror{animation:fadeUp 0.35s ease}
.gateway-mirror-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.3em;color:var(--stone);text-transform:uppercase;margin-bottom:11px}
.gateway-mirror-state{display:flex;align-items:center;gap:14px;padding:13px 15px;background:rgba(250,247,242,0.03);border:1px solid var(--border);border-radius:3px;margin-bottom:11px}
.gateway-mirror-emotion{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--cream)}
.gateway-mirror-label{font-size:10px;color:var(--stone);letter-spacing:0.18em;font-family:'Cormorant Garamond',serif;text-transform:uppercase;margin-bottom:2px}
.gateway-mirror-narrator{font-size:12px;font-weight:300;color:var(--stone-light);line-height:1.85;letter-spacing:0.04em;padding-left:10px;border-left:2px solid rgba(138,132,125,0.3);margin-bottom:6px}
.gateway-mirror-confirm{width:100%;background:rgba(184,115,85,0.1);border:1px solid rgba(184,115,85,0.45);border-radius:3px;color:var(--cream);font-family:'Noto Serif JP',serif;font-size:13px;font-weight:300;letter-spacing:0.06em;padding:13px;cursor:pointer;margin-top:12px}

/* EMOTION GRID */
.emotion-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.emotion-btn{background:rgba(250,247,242,0.03);border:1px solid var(--border);border-radius:4px;padding:13px 7px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all 0.2s}
.emotion-btn.active{border-color:rgba(184,115,85,0.6);background:rgba(184,115,85,0.08)}
.emotion-kanji{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;font-weight:300}
.emotion-label{font-size:10px;color:var(--stone);letter-spacing:0.1em}
.narrator-strip{font-size:12px;color:var(--stone-light);line-height:1.85;letter-spacing:0.04em;padding:10px 12px;background:rgba(138,132,125,0.06);border-radius:3px;border-left:2px solid var(--stone);margin-bottom:13px}

/* INTENSITY */
.intensity-wrap{margin:14px 0}
.intensity-label{display:flex;justify-content:space-between;font-size:11px;color:var(--stone);letter-spacing:0.1em;margin-bottom:7px}
input[type=range]{width:100%;height:3px;appearance:none;background:rgba(138,132,125,0.2);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{appearance:none;width:18px;height:18px;border-radius:50%;background:var(--terra);cursor:pointer;border:2px solid var(--bg)}

/* TRIGGERS */
.trigger-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.trigger-tag{background:none;border:1px solid var(--border);border-radius:2px;color:var(--stone-light);font-family:'Noto Serif JP',serif;font-size:11px;font-weight:300;letter-spacing:0.05em;padding:6px 11px;cursor:pointer;transition:all 0.2s}
.trigger-tag.active{border-color:rgba(184,115,85,0.6);background:rgba(184,115,85,0.08);color:var(--cream)}
.not-fault{background:rgba(138,132,125,0.06);border-left:2px solid var(--stone);padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--stone-light);line-height:1.8}
.not-fault strong{color:var(--terra-light);display:block;font-weight:300}
.memo-textarea{width:100%;background:rgba(250,247,242,0.03);border:1px solid var(--border);border-radius:3px;color:var(--cream);font-family:'Noto Serif JP',serif;font-size:13px;font-weight:300;letter-spacing:0.04em;padding:11px;resize:none;outline:none;line-height:1.8;margin-bottom:7px;transition:border-color 0.2s}
.memo-textarea:focus{border-color:rgba(138,132,125,0.4)}
.memo-textarea.write-required{border-color:rgba(122,158,142,0.4)!important}
.memo-char{font-size:10px;color:var(--stone);letter-spacing:0.1em;text-align:right;margin-bottom:11px}
.log-btn{width:100%;background:rgba(184,115,85,0.1);border:1px solid rgba(184,115,85,0.4);border-radius:3px;color:var(--cream);font-family:'Noto Serif JP',serif;font-size:14px;font-weight:300;letter-spacing:0.1em;padding:13px;cursor:pointer;transition:all 0.2s}

/* ACTION FEEDBACK CARD ③ */
.action-feedback-card{background:rgba(184,115,85,0.06);border:1px solid rgba(184,115,85,0.22);border-radius:4px;padding:14px 16px;margin-bottom:14px;animation:fadeUp 0.4s ease}
.action-feedback-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.28em;color:var(--terra);text-transform:uppercase;margin-bottom:8px}
.action-feedback-q{font-size:13px;font-weight:300;color:var(--warm-mid);line-height:1.8;letter-spacing:0.05em;margin-bottom:12px}
.action-feedback-action{font-size:12px;color:var(--stone-light);font-style:italic;margin-bottom:12px;padding:8px 10px;background:rgba(184,115,85,0.05);border-radius:2px;line-height:1.7}
.action-feedback-btns{display:flex;gap:6px;flex-wrap:wrap}
.action-feedback-btn{flex:1;min-width:0;background:none;border:1px solid var(--border);border-radius:2px;color:var(--stone-light);font-family:'Noto Serif JP',serif;font-size:11px;font-weight:300;letter-spacing:0.05em;padding:8px 4px;cursor:pointer;transition:all 0.2s;text-align:center}
.action-feedback-btn.selected-good{border-color:rgba(122,158,142,0.5);color:var(--sage);background:rgba(122,158,142,0.08)}
.action-feedback-btn.selected-same{border-color:rgba(184,115,85,0.4);color:var(--terra-light);background:rgba(184,115,85,0.06)}
.action-feedback-btn.selected-unknown{border-color:var(--border);color:var(--stone-light);background:rgba(138,132,125,0.06)}
.action-feedback-result{font-size:13px;font-weight:300;line-height:1.9;letter-spacing:0.05em;padding:10px 12px;border-radius:3px;margin-top:10px}
.action-feedback-result.good{color:var(--sage);background:rgba(122,158,142,0.07);border:1px solid rgba(122,158,142,0.18)}
.action-feedback-result.same{color:var(--warm-mid);background:rgba(184,115,85,0.05);border:1px solid rgba(184,115,85,0.15)}
.action-feedback-result.unknown{color:var(--stone-light);background:rgba(138,132,125,0.05);border:1px solid var(--border)}

/* INTEGRATED FACT CARD */
.integrated-fact-card{background:linear-gradient(135deg,rgba(184,115,85,0.07),rgba(26,23,20,0));border:1px solid rgba(184,115,85,0.25);border-radius:4px;padding:15px 17px;margin-bottom:13px;animation:fadeUp 0.4s ease}
.integrated-fact-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.28em;color:var(--terra);text-transform:uppercase;margin-bottom:9px}
.integrated-emotion-row{display:flex;align-items:baseline;gap:10px;margin-bottom:9px}
.integrated-emotion-kanji{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:var(--cream);font-style:italic}
.integrated-emotion-detail{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--stone);letter-spacing:0.15em}
.integrated-care-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.integrated-chip{font-size:10px;color:var(--stone-light);background:rgba(138,132,125,0.1);border:1px solid var(--border);border-radius:2px;padding:3px 7px;letter-spacing:0.05em}
.integrated-msg{font-size:13px;font-weight:300;color:var(--warm-mid);line-height:1.85;letter-spacing:0.05em;margin-bottom:9px}
.integrated-verdict{display:flex;gap:9px;align-items:flex-start}
.integrated-verdict-line{width:2px;min-height:18px;background:linear-gradient(to bottom,var(--terra),transparent);flex-shrink:0;margin-top:3px}
.integrated-verdict-text{font-size:11px;color:var(--terra-light);letter-spacing:0.07em;line-height:1.7;font-style:italic}

/* PRACTICE REPORT ③ */
.practice-report-card{background:rgba(122,158,142,0.06);border:1px solid rgba(122,158,142,0.22);border-radius:4px;padding:14px 16px;margin-bottom:14px;animation:fadeUp 0.4s ease}
.practice-report-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.28em;color:var(--sage);text-transform:uppercase;margin-bottom:7px}
.practice-report-q{font-size:13px;font-weight:300;color:var(--warm-mid);line-height:1.8;letter-spacing:0.05em;margin-bottom:11px}
.practice-report-btns{display:flex;gap:8px}
.practice-report-btn{flex:1;background:none;border:1px solid var(--border);border-radius:2px;color:var(--stone-light);font-family:'Noto Serif JP',serif;font-size:12px;font-weight:300;letter-spacing:0.06em;padding:10px;cursor:pointer;transition:all 0.2s}
.practice-report-btn.yes{border-color:rgba(122,158,142,0.5);color:var(--sage)}
.practice-result{font-size:13px;font-weight:300;line-height:1.9;letter-spacing:0.05em;padding:11px 13px;border-radius:3px}
.practice-result.yes{color:var(--sage);background:rgba(122,158,142,0.07);border:1px solid rgba(122,158,142,0.2)}
.practice-result.no{color:var(--stone-light);background:rgba(138,132,125,0.05);border:1px solid var(--border)}

/* ENERGY SELECTOR */
.energy-selector{animation:fadeUp 0.4s ease}
.energy-selector-label{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:0.18em;color:var(--sage);margin-bottom:3px}
.energy-selector-q{font-size:15px;font-weight:300;color:var(--cream);letter-spacing:0.06em;margin-bottom:4px}
.energy-selector-sub{font-size:11px;color:var(--stone);letter-spacing:0.08em;margin-bottom:13px}
.energy-btns{display:flex;flex-direction:column;gap:7px}
.energy-btn{background:rgba(250,247,242,0.03);border:1px solid var(--border);border-radius:3px;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all 0.2s}
.energy-btn:active{background:rgba(184,115,85,0.08);border-color:rgba(184,115,85,0.35)}
.energy-btn-label{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:300;color:var(--cream);letter-spacing:0.06em}
.energy-btn-sub{font-size:10px;color:var(--stone);letter-spacing:0.12em;font-family:'Cormorant Garamond',serif}

/* BREATH CARD */
.breath-auto-card{background:rgba(122,158,142,0.06);border:1px solid rgba(122,158,142,0.2);border-radius:4px;padding:15px;animation:fadeUp 0.4s ease}
.breath-auto-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.28em;color:var(--sage);text-transform:uppercase;margin-bottom:7px}
.breath-anim-wrap{display:flex;flex-direction:column;align-items:center;gap:9px;margin-bottom:14px}
.breath-circle{width:76px;height:76px;border-radius:50%;border:2px solid rgba(122,158,142,0.3);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.4s ease}
.breath-circle.inhale{animation:breathIn 4s ease-in-out forwards;border-color:rgba(122,158,142,0.6)}
.breath-circle.hold{border-color:rgba(122,158,142,0.5)}
.breath-circle.exhale{animation:breathOut 6s ease-in-out forwards;border-color:rgba(122,158,142,0.3)}
.breath-phase-label{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--sage)}
.breath-phase-sec{font-size:10px;color:var(--stone);letter-spacing:0.15em}
.breath-round{font-size:10px;color:var(--stone);letter-spacing:0.2em;font-family:'Cormorant Garamond',serif}
.breath-skip-btn{background:none;border:none;color:var(--stone);font-family:'Noto Serif JP',serif;font-size:11px;cursor:pointer;letter-spacing:0.1em;display:block;margin:6px auto 0}
.breath-done-msg{font-size:13px;font-weight:300;color:var(--warm-mid);text-align:center;line-height:1.8;padding:7px 0}

/* CORE CARD */
.core-card{background:rgba(250,247,242,0.03);border:1px solid var(--border);border-radius:4px;padding:15px;animation:fadeUp 0.4s ease}
.core-tag-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.core-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.28em;color:var(--stone);text-transform:uppercase}
.core-learning-badge{display:flex;align-items:center;gap:5px;background:rgba(122,158,142,0.1);border:1px solid rgba(122,158,142,0.25);border-radius:20px;padding:3px 9px}
.core-learning-dot{width:5px;height:5px;border-radius:50%;background:var(--sage);animation:pulse 2.5s infinite;flex-shrink:0}
.core-learning-badge span{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.18em;color:var(--sage);white-space:nowrap}
.core-narrative{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--warm);letter-spacing:0.04em;line-height:1.7;margin-bottom:14px}
.core-question{display:flex;gap:9px;align-items:flex-start;margin-bottom:13px}
.core-q-line{width:2px;min-height:18px;background:var(--stone);flex-shrink:0;margin-top:3px}
.core-q-text{font-size:12px;color:var(--stone-light);letter-spacing:0.06em;line-height:1.8}
.write-prompt{font-size:11px;color:var(--sage);letter-spacing:0.1em;margin-bottom:7px;font-style:italic;font-family:'Cormorant Garamond',serif}
.core-aff-options{display:flex;flex-direction:column;gap:6px;margin-bottom:9px}
.core-aff-btn{background:none;border:1px solid var(--border);border-radius:2px;color:var(--stone-light);font-family:'Noto Serif JP',serif;font-size:12px;font-weight:300;letter-spacing:0.05em;padding:9px 11px;cursor:pointer;text-align:left;transition:all 0.2s;line-height:1.6}
.core-aff-btn.active{border-color:rgba(184,115,85,0.5);background:rgba(184,115,85,0.08);color:var(--cream)}
.presence-label{font-size:11px;color:var(--stone);letter-spacing:0.1em;margin-bottom:7px;font-style:italic}
.self-complete-save{width:100%;background:rgba(184,115,85,0.1);border:1px solid rgba(184,115,85,0.4);border-radius:2px;color:var(--cream);font-family:'Noto Serif JP',serif;font-size:13px;font-weight:300;letter-spacing:0.08em;padding:11px;cursor:pointer;transition:all 0.2s;margin-top:7px}
.core-saved{text-align:center;padding:11px 0;animation:fadeUp 0.4s ease}
.core-saved-word{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--sage);letter-spacing:0.04em;line-height:1.5;margin-bottom:5px}
.core-saved-note{font-size:10px;color:var(--stone);letter-spacing:0.15em;margin-bottom:8px}
/* ②: 承認の旅予告 */
.word-journey-hint{font-size:11px;color:rgba(122,158,142,0.75);letter-spacing:0.1em;font-style:italic;font-family:'Cormorant Garamond',serif;padding-top:7px;border-top:1px solid rgba(122,158,142,0.12)}

/* PAST SELF */
.past-self-card{background:rgba(138,132,125,0.06);border:1px solid var(--border);border-radius:4px;padding:15px;animation:fadeUp 0.4s ease}
.past-self-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.28em;color:var(--stone);text-transform:uppercase;margin-bottom:7px}
.past-self-label{font-size:12px;color:var(--stone-light);letter-spacing:0.06em;margin-bottom:4px}
.past-self-context{font-size:10px;color:var(--stone);letter-spacing:0.1em;margin-bottom:9px}
.past-self-word{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--warm);letter-spacing:0.04em;line-height:1.5;margin-bottom:7px}
.past-self-note{font-size:11px;color:var(--stone);letter-spacing:0.08em;font-style:italic}

/* SESSION SUMMARY */
.session-summary-card{background:rgba(250,247,242,0.03);border:1px solid var(--border);border-radius:4px;padding:15px;animation:fadeUp 0.4s ease}
.session-summary-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.28em;color:var(--stone);text-transform:uppercase;margin-bottom:11px}
.session-summary-row{display:flex;gap:13px;margin-bottom:9px}
.session-summary-block{flex:1}
.session-summary-label{font-size:10px;color:var(--stone);letter-spacing:0.15em;margin-bottom:3px}
.session-summary-val{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--cream)}
.session-summary-sub{font-size:11px;color:var(--stone);letter-spacing:0.1em;margin-left:5px}
.session-summary-caption{font-size:12px;color:var(--stone-light);line-height:1.8;letter-spacing:0.05em;font-style:italic}

/* COMMUNITY CARD */
.community-card{background:rgba(138,132,125,0.06);border:1px solid var(--border);border-radius:4px;padding:15px;animation:fadeUp 0.4s ease}
.community-card-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.28em;color:var(--stone);text-transform:uppercase;margin-bottom:11px}
.community-stats{display:flex;flex-direction:column;gap:9px;margin-bottom:11px}
.community-stat{display:flex;align-items:baseline;gap:9px}
.community-stat-pct{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--terra-light);min-width:54px}
.community-stat-text{font-size:12px;color:var(--stone-light);line-height:1.7;letter-spacing:0.04em}
.community-note{font-size:11px;color:var(--stone);letter-spacing:0.06em;line-height:1.8;font-style:italic;border-top:1px solid var(--border);padding-top:9px}

/* GROWTH NARRATIVE */
.growth-narrative-card{background:rgba(184,115,85,0.05);border:1px solid rgba(184,115,85,0.2);border-radius:4px;padding:15px;animation:fadeUp 0.4s ease}
.growth-narrative-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.28em;color:var(--terra);text-transform:uppercase;margin-bottom:4px}
.growth-narrative-days{font-size:10px;color:var(--stone);letter-spacing:0.15em;margin-bottom:11px}
.growth-narrative-text{font-size:13px;font-weight:300;color:var(--warm-mid);line-height:2;letter-spacing:0.05em;margin-bottom:11px}
.growth-narrative-child{font-size:11px;color:var(--terra-light);line-height:1.7;letter-spacing:0.06em;font-style:italic;border-top:1px solid rgba(184,115,85,0.15);padding-top:9px}

/* TOMORROW ACTION */
.tomorrow-action-card{background:rgba(250,247,242,0.03);border:1px solid var(--border);border-radius:4px;padding:15px;animation:fadeUp 0.4s ease}
.tomorrow-action-title{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.2em;color:var(--stone);text-transform:uppercase;margin-bottom:9px}
.tomorrow-action-text{font-size:13px;font-weight:300;color:var(--cream);line-height:1.85;letter-spacing:0.05em;margin-bottom:7px}
.tomorrow-action-why{font-size:11px;color:var(--stone-light);line-height:1.7;letter-spacing:0.04em;font-style:italic}

/* SESSION CLOSE BTN */
.session-close-btn{width:100%;background:rgba(184,115,85,0.1);border:1px solid rgba(184,115,85,0.4);border-radius:3px;color:var(--cream);font-family:'Noto Serif JP',serif;font-size:14px;font-weight:300;letter-spacing:0.1em;padding:13px;cursor:pointer;animation:fadeUp 0.3s ease}

/* HISTORY */
.history-label{font-size:11px;color:var(--stone);letter-spacing:0.15em;margin-bottom:9px;font-family:'Cormorant Garamond',serif;text-transform:uppercase}
.history-item{background:rgba(250,247,242,0.02);border:1px solid var(--border);border-radius:3px;padding:11px;margin-bottom:7px}
.history-meta{font-size:10px;color:var(--stone);letter-spacing:0.12em;margin-bottom:3px}
.history-emotion-row{display:flex;justify-content:space-between;align-items:center}
.history-emotion{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--warm)}
.history-trigger{font-size:11px;color:var(--stone-light);letter-spacing:0.06em;margin-top:2px}
.history-memo{font-size:11px;color:var(--stone);line-height:1.8;letter-spacing:0.04em;font-style:italic;border-top:1px solid var(--border);padding-top:7px;margin-top:7px}
.week-chart{display:flex;gap:6px;align-items:flex-end;height:60px;margin:14px 0}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.week-bar-inner{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:1px}
.week-bar{width:100%;border-radius:1px;min-height:2px}
.week-bar.irr{background:var(--terra)}
.week-bar.anx{background:var(--stone)}
.week-bar.calm{background:var(--sage)}
.week-day{font-family:'Cormorant Garamond',serif;font-size:9px;color:var(--stone);letter-spacing:0.1em}

/* CARE */
.care-total{text-align:center;margin-bottom:18px;padding-bottom:15px;border-bottom:1px solid var(--border)}
.care-total-num{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:var(--cream);line-height:1}
.care-total-unit{font-size:11px;color:var(--stone);letter-spacing:0.2em;margin:4px 0 11px}
.care-message{font-size:12px;color:var(--stone-light);line-height:1.85;letter-spacing:0.04em}
.shadow-works-list{display:flex;flex-direction:column;gap:7px}
.shadow-work-item{display:flex;align-items:center;gap:11px;padding:11px;background:rgba(250,247,242,0.02);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all 0.2s}
.shadow-work-item.checked{background:rgba(122,158,142,0.06);border-color:rgba(122,158,142,0.2)}
.shadow-work-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--stone);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:10px;color:transparent}
.shadow-work-check.checked{background:var(--sage);border-color:var(--sage);color:white}
.shadow-work-name{flex:1;font-size:13px;font-weight:300;color:var(--warm-mid);letter-spacing:0.05em}
.shadow-work-pts{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--stone)}

/* MAP */
.map-hero{margin-bottom:18px}
.map-hero-label{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.32em;color:var(--stone);text-transform:uppercase;margin-bottom:3px}
.map-hero-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;color:var(--cream);letter-spacing:0.04em;margin-bottom:5px}
.map-hero-sub{font-size:12px;color:var(--stone-light);line-height:1.85;letter-spacing:0.05em}
.transform-timeline{display:flex;flex-direction:column;margin:18px 0}
.transform-phase{display:flex;gap:13px}
.transform-phase.past{opacity:0.65}
.transform-phase.current{opacity:1}
.transform-phase.future{opacity:0.42}
.transform-phase-left{display:flex;flex-direction:column;align-items:center;width:22px;flex-shrink:0}
.transform-node{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Cormorant Garamond',serif;flex-shrink:0}
.transform-node.past{background:rgba(122,158,142,0.2);border:1px solid var(--sage);color:var(--sage)}
.transform-node.current{background:rgba(184,115,85,0.18);border:2px solid var(--terra);color:var(--terra-light);box-shadow:0 0 12px rgba(184,115,85,0.25)}
.transform-node.future{background:transparent;border:1px solid var(--border);color:var(--stone)}
.transform-line{width:1px;flex:1;min-height:22px;margin:4px 0}
.transform-line.past{background:rgba(122,158,142,0.35)}
.transform-line.current{background:linear-gradient(to bottom,var(--terra),rgba(138,132,125,0.2))}
.transform-line.future{background:rgba(138,132,125,0.12)}
.transform-phase-right{flex:1;padding-bottom:20px}
.transform-phase-meta{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.transform-phase-label{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.2em;color:var(--stone-light);text-transform:uppercase}
.transform-phase-days{font-size:10px;color:var(--stone);letter-spacing:0.08em;font-family:'Cormorant Garamond',serif}
.transform-marker{font-size:10px;letter-spacing:0.1em;font-family:'Cormorant Garamond',serif;padding:2px 7px;border-radius:10px}
.transform-marker.past{color:var(--sage);background:rgba(122,158,142,0.1);border:1px solid rgba(122,158,142,0.3)}
.transform-marker.current{color:var(--terra-light);background:rgba(184,115,85,0.1);border:1px solid rgba(184,115,85,0.4)}
.transform-phase-title{font-size:14px;font-weight:300;color:var(--cream);letter-spacing:0.04em;margin-bottom:6px}
.transform-phase-body{font-size:12px;color:var(--stone-light);line-height:1.9;letter-spacing:0.04em}
.transform-footer{padding:13px 0}
.transform-footer-line{width:32px;height:1px;background:var(--terra);margin-bottom:11px}
.transform-footer-text{font-size:12px;font-weight:300;color:var(--warm-mid);line-height:2;letter-spacing:0.05em;font-style:italic}

/* SELF CHANGE CARD */
.self-change-card{background:linear-gradient(135deg,rgba(122,158,142,0.06),rgba(26,23,20,0));border:1px solid rgba(122,158,142,0.2);border-radius:4px;padding:18px;margin-bottom:14px;animation:fadeUp 0.4s ease}
.self-change-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.32em;color:var(--sage);text-transform:uppercase;margin-bottom:5px}
.self-change-title{font-size:15px;font-weight:300;color:var(--cream);letter-spacing:0.06em;margin-bottom:15px}
.self-change-rows{display:flex;flex-direction:column;gap:13px}
.self-change-row{padding-bottom:13px;border-bottom:1px solid rgba(138,132,125,0.1)}
.self-change-row:last-child{border-bottom:none;padding-bottom:0}
.self-change-before{font-size:11px;color:var(--stone);letter-spacing:0.05em;line-height:1.7;font-style:italic;margin-bottom:4px}
.self-change-arrow{font-size:13px;color:rgba(122,158,142,0.5);margin:2px 0 4px 1px}
.self-change-after{font-size:12px;font-weight:300;color:var(--warm-mid);letter-spacing:0.05em;line-height:1.85}
.self-change-note{display:flex;gap:9px;align-items:flex-start;margin-top:13px;padding-top:11px;border-top:1px solid rgba(122,158,142,0.15)}
.self-change-note-line{width:2px;min-height:22px;background:linear-gradient(to bottom,var(--sage),transparent);flex-shrink:0;margin-top:2px}
.self-change-note-text{font-size:11px;color:var(--sage);letter-spacing:0.08em;line-height:1.75;font-style:italic}

/* MAP PATTERN */
.map-pattern-label{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.25em;color:var(--stone);text-transform:uppercase;margin-bottom:11px}
.map-pattern-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.map-pattern-name{font-size:12px;color:var(--stone-light);letter-spacing:0.05em;min-width:110px}
.map-pattern-bar-track{flex:1;height:3px;background:rgba(138,132,125,0.15);border-radius:2px;overflow:hidden}
.map-pattern-bar-fill{height:100%;background:var(--terra);border-radius:2px}
.map-pattern-count{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--stone)}
.map-pattern-insight{font-size:12px;color:var(--stone-light);line-height:1.8;letter-spacing:0.05em;margin-top:9px;font-style:italic;padding:9px 11px;background:rgba(138,132,125,0.06);border-radius:3px}
.map-empty{font-size:12px;color:var(--stone);line-height:1.8;padding:15px;text-align:center;background:rgba(138,132,125,0.04);border-radius:3px}

/* RESET */
.cbt-list{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.cbt-item{background:rgba(250,247,242,0.02);border:1px solid var(--border);border-radius:4px;padding:15px;text-align:left;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;gap:4px}
.cbt-item-num{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.25em;color:var(--stone);text-transform:uppercase}
.cbt-item-title{font-size:15px;font-weight:300;color:var(--cream);letter-spacing:0.05em}
.cbt-item-duration{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--stone);letter-spacing:0.15em}
.cbt-item-desc{font-size:12px;color:var(--stone-light);line-height:1.7;letter-spacing:0.04em}
.cbt-ex-wrap{background:rgba(250,247,242,0.02);border:1px solid var(--border);border-radius:4px;padding:17px}
.cbt-ex-num{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.2em;color:var(--stone);text-transform:uppercase;margin-bottom:4px}
.cbt-ex-title{font-size:18px;font-weight:300;color:var(--cream);letter-spacing:0.05em;margin-bottom:15px}
.cbt-steps{display:flex;flex-direction:column;gap:9px;margin-bottom:15px}
.cbt-step{display:flex;gap:11px;align-items:flex-start}
.cbt-step-num{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--stone);min-width:17px;margin-top:1px}
.cbt-step-text{font-size:13px;font-weight:300;color:var(--warm-mid);line-height:1.85;letter-spacing:0.04em}
.cbt-complete-btn{width:100%;background:rgba(122,158,142,0.1);border:1px solid rgba(122,158,142,0.3);border-radius:3px;color:var(--cream);font-family:'Noto Serif JP',serif;font-size:13px;font-weight:300;letter-spacing:0.08em;padding:11px;cursor:pointer;margin-bottom:9px}
.cbt-back-btn{background:none;border:none;color:var(--stone);font-family:'Noto Serif JP',serif;font-size:11px;cursor:pointer;letter-spacing:0.1em;display:block;text-align:center;width:100%}
.cbt-done-state{text-align:center;padding:15px 0;animation:fadeUp 0.4s ease}
.cbt-done-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--sage);margin-bottom:7px}
.cbt-done-body{font-size:13px;font-weight:300;color:var(--stone-light);line-height:1.85;letter-spacing:0.05em;margin-bottom:13px}
.cbt-practice-tip{background:rgba(122,158,142,0.05);border:1px solid rgba(122,158,142,0.18);border-radius:3px;padding:11px 13px;font-size:12px;color:var(--stone-light);line-height:1.8;letter-spacing:0.05em;text-align:left}
.cbt-practice-tip strong{color:var(--sage);display:block;font-weight:300;margin-bottom:3px;font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase}

/* GUIDE */
.guide-hero{margin-bottom:22px}
.guide-hero-en{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.32em;color:var(--stone);text-transform:uppercase;margin-bottom:3px}
.guide-hero-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;color:var(--cream);letter-spacing:0.04em;margin-bottom:7px}
.guide-hero-body{font-size:12px;color:var(--stone-light);line-height:1.85;letter-spacing:0.05em}
.guide-step{display:flex;gap:15px;padding-bottom:3px}
.guide-step-num-wrap{display:flex;flex-direction:column;align-items:center;width:23px;flex-shrink:0}
.guide-step-num{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--stone);line-height:1}
.guide-step-line{width:1px;flex:1;background:rgba(138,132,125,0.15);min-height:18px;margin:5px 0}
.guide-step-icon{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.25em;color:var(--terra);text-transform:uppercase;margin-bottom:2px}
.guide-step-title{font-size:15px;font-weight:300;color:var(--cream);letter-spacing:0.05em;margin-bottom:7px}
.guide-step-body{font-size:12px;color:var(--stone-light);line-height:1.9;letter-spacing:0.04em;margin-bottom:9px;padding-bottom:18px}
.guide-callout{font-size:11px;color:var(--terra-light);letter-spacing:0.08em;line-height:1.7;font-style:italic;padding:7px 9px;background:rgba(184,115,85,0.06);border-radius:2px;margin-bottom:18px}
.faq-item{border-bottom:1px solid var(--border)}
.faq-q{font-size:13px;font-weight:300;color:var(--warm-mid);letter-spacing:0.04em;padding:13px 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:9px;line-height:1.5;user-select:none}
.faq-icon{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--stone);flex-shrink:0}
.faq-a{font-size:12px;color:var(--stone-light);line-height:1.9;letter-spacing:0.04em;padding:0 0 13px;display:none}
.faq-a.open{display:block}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(26,23,20,0.97);border-top:1px solid var(--border);display:flex;padding:8px 0 max(env(safe-area-inset-bottom,0px),8px)}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 0;position:relative;transition:all 0.2s}
.nav-icon{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--stone);transition:color 0.2s}
.nav-label{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.18em;color:var(--stone);text-transform:uppercase;transition:color 0.2s}
.nav-btn.active .nav-icon,.nav-btn.active .nav-label{color:var(--cream)}
.nav-line{position:absolute;top:0;left:50%;transform:translateX(-50%);width:18px;height:1px;background:var(--terra)}

/* SESSION COMPLETE */
.session-complete-overlay{position:fixed;inset:0;z-index:100;background:rgba(16,13,11,0.96);display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s ease}
.session-complete-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:26px 22px;max-width:360px;width:calc(100% - 32px);max-height:90vh;overflow-y:auto}
.session-complete-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.32em;color:var(--stone);text-transform:uppercase;margin-bottom:7px}
.session-complete-date{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--stone);letter-spacing:0.15em;margin-bottom:11px}
.session-complete-headline{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--cream);letter-spacing:0.04em;line-height:1.3;margin-bottom:16px}
.session-complete-items{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.session-complete-item-label{font-size:10px;color:var(--stone);letter-spacing:0.18em;margin-bottom:3px}
.session-complete-item-val{font-size:14px;font-weight:300;color:var(--warm);letter-spacing:0.04em;line-height:1.5}
.session-complete-msg{font-size:13px;font-weight:300;color:var(--stone-light);line-height:1.9;letter-spacing:0.05em;padding:13px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:13px}
.tomorrow-causality-card{background:rgba(122,158,142,0.06);border:1px solid rgba(122,158,142,0.22);border-radius:4px;padding:13px 15px;margin-bottom:16px}
.tomorrow-causality-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.3em;color:var(--sage);text-transform:uppercase;margin-bottom:7px}
.tomorrow-causality-text{font-size:12px;font-weight:300;color:var(--stone-light);line-height:2;letter-spacing:0.05em}
.session-complete-close{width:100%;background:none;border:1px solid var(--border);border-radius:2px;color:var(--stone-light);font-family:'Noto Serif JP',serif;font-size:13px;font-weight:300;letter-spacing:0.08em;padding:11px;cursor:pointer}

/* MILESTONE FLASH */
.milestone-flash-num{font-family:'Cormorant Garamond',serif;font-size:64px;font-weight:300;color:var(--terra-light);line-height:1;margin-bottom:9px}
.milestone-flash-label{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--stone);letter-spacing:0.28em;text-transform:uppercase;margin-bottom:15px}
.milestone-flash-msg{font-size:14px;font-weight:300;color:var(--warm-mid);letter-spacing:0.06em;line-height:1.85;max-width:260px}

/* WORD RECEIVED FLASH */
.word-received-label{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.35em;color:var(--stone);text-transform:uppercase;margin-bottom:22px}
.word-received-text{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;color:var(--cream);letter-spacing:0.04em;line-height:1.5;max-width:280px}

/* COMMUNITY FLASH */
.community-flash-pct{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:300;color:var(--terra-light);line-height:1;margin-bottom:11px}
.community-flash-text{font-size:14px;font-weight:300;color:var(--warm-mid);letter-spacing:0.06em;line-height:1.8;margin-bottom:17px;max-width:260px}
.community-flash-note{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--stone);letter-spacing:0.12em}

/* ONBOARDING */
.onboard-overlay{position:fixed;inset:0;z-index:100;background:rgba(16,13,11,0.97);display:flex;align-items:center;justify-content:center}
.onboard-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:26px 22px;max-width:360px;width:calc(100% - 32px);max-height:90vh;overflow-y:auto}
.onboard-tag{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.32em;color:var(--stone);text-transform:uppercase;margin-bottom:11px}
.onboard-headline{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--cream);letter-spacing:0.04em;line-height:1.35;margin-bottom:13px}
.onboard-body{font-size:13px;font-weight:300;color:var(--stone-light);line-height:1.95;letter-spacing:0.05em;margin-bottom:13px}
.onboard-accent{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--terra-light);letter-spacing:0.06em;line-height:1.5;padding:11px;border:1px solid rgba(184,115,85,0.2);border-radius:3px;margin-bottom:14px}
.onboard-next,.onboard-start{width:100%;background:rgba(184,115,85,0.12);border:1px solid rgba(184,115,85,0.45);border-radius:3px;color:var(--cream);font-family:'Noto Serif JP',serif;font-size:14px;font-weight:300;letter-spacing:0.1em;padding:13px;cursor:pointer;display:block;margin-bottom:8px}
.onboard-skip{background:none;border:none;color:var(--stone);font-family:'Noto Serif JP',serif;font-size:12px;cursor:pointer;letter-spacing:0.1em;padding:7px;display:block;width:100%;text-align:center}
.diag-choices{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.diag-choice-btn{background:transparent;border:1px solid var(--border);border-radius:3px;padding:11px 13px;text-align:left;font-family:'Noto Serif JP',serif;font-size:13px;font-weight:300;color:var(--warm-mid);letter-spacing:0.04em;cursor:pointer;transition:all 0.2s;line-height:1.5;width:100%}
.diag-choice-btn.active{border-color:var(--terra);background:rgba(184,115,85,0.1);color:var(--cream)}
.diag-response-line{width:26px;height:2px;background:var(--terra);margin-bottom:14px}
.diag-science-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0}
.diag-science-item{background:rgba(138,132,125,0.08);border:1px solid var(--border);border-radius:3px;padding:11px 9px;text-align:center}
.diag-science-num{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--terra-light);margin-bottom:4px}
.diag-science-text{font-size:10px;color:var(--stone);letter-spacing:0.06em;line-height:1.6}
.mirror-response-card{background:rgba(184,115,85,0.06);border:1px solid rgba(184,115,85,0.25);border-radius:4px;padding:15px;margin-bottom:13px}
.mirror-echo{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--stone-light);letter-spacing:0.04em;margin-bottom:9px;line-height:1.6}
.mirror-line{width:22px;height:1px;background:var(--terra);margin-bottom:9px}

// ═══════════════════ RENDER ═══════════════════
function setState(u){Object.assign(state,u);render();}
function render(){document.getElementById("root").innerHTML=buildAll();}

function buildAll(){
  return buildFlashes()+(state.onboarding?buildOnboarding():buildApp());
}

// ─── FLASHES ───
function buildFlashes(){
  let h="";
  if(state.wordReceivedFlash){
    h+=`<div class="flash-overlay"><div class="flash-center">
      <div class="word-received-label">今日の言葉</div>
      <div class="word-received-text">&#8220;${esc(state.selfWordFinal)}&#8221;</div>
      <div style="margin-top:28px;font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--stone);letter-spacing:0.2em">この言葉を、声に出してみてください。</div>
    </div></div>`;
  }
  if(state.communityFlash){
    const hour=new Date().getHours();
    // 時刻帯別「今夜の共存」人数（同時性の孤独解毒）
    const coexistMsg=hour>=21?{num:"2,400人以上",timeCtx:"今夜この時間帯に"}
      :hour>=18?{num:"3,100人以上",timeCtx:"今夜の時間帯に"}
      :hour>=12?{num:"1,800人以上",timeCtx:"今日この時間帯に"}
      :{num:"900人以上",timeCtx:"今朝この時間帯に"};
    const emoCtx=state.selectedEmotion?.id==="irritated"?"同じ「苛立ち」を記録した保護者が"
      :state.selectedEmotion?.id==="tired"?"同じ「疲弊」を記録した保護者が"
      :state.selectedEmotion?.id==="anxious"?"同じ「不安」を記録した保護者が"
      :"自分の感情を記録した保護者が";
    h+=`<div class="flash-overlay"><div class="flash-center">
      <div class="community-flash-pct">${coexistMsg.num}</div>
      <div class="community-flash-text">${coexistMsg.timeCtx}、${emoCtx}このアプリを開いています。</div>
      <div class="community-flash-note">あなたが感じていることを、今夜も誰かが感じている。</div>
    </div></div>`;
  }
  if(state.milestoneFlash){
    const ms=state.milestoneFlash;
    h+=`<div class="flash-overlay" onclick="dismissMilestone()" style="cursor:pointer"><div class="flash-center">
      <div class="milestone-flash-num">${ms.num}</div>
      <div class="milestone-flash-label">Milestone</div>
      <div class="milestone-flash-msg">${ms.msg.replace(/\n/g,"<br>")}</div>
      <div style="margin-top:22px;font-size:11px;color:var(--stone);letter-spacing:0.1em">タップして続ける</div>
    </div></div>`;
  }
  return h;
}

// ─── ONBOARDING ───
function buildOnboarding(){
  const s=state;let inner="";
  if(s.onboardStep===0){
    inner=`<div class="onboard-tag">あなたへ</div>
    <div class="onboard-headline">今日、子どもとの間で<br>一番しんどかった場面を<br>一言で教えてください。</div>
    <div class="onboard-body" style="margin-bottom:12px">誰も見ていません。正直に。</div>
    ${!s.diagMirrorShown?`
      <textarea class="memo-textarea" placeholder="例：朝、また怒鳴ってしまった。登校を渋られて、もう限界だと思った。" rows="3" maxlength="100" style="margin-bottom:9px;font-size:13px" oninput="setState({diagFreeText:this.value})">${esc(s.diagFreeText)}</textarea>
      ${s.diagFreeText.trim()?`<button class="onboard-next" onclick="submitDiagText()" style="animation:fadeUp 0.3s ease">これを送る</button>`:""}
      <div style="margin-top:14px">
        <div class="presence-label" style="margin-bottom:7px">または、近いものを選ぶ：</div>
        <div class="diag-choices">
          ${[{id:"shituke",text:"「自分のしつけが悪いのかも」と思う"},{id:"iraira",text:"怒鳴った後、自己嫌悪に陥る"},{id:"hitori",text:"誰にも言えないまま一人で抱えている"},{id:"mirai",text:"子どもの将来が不安で眠れない"},{id:"tsukare",text:"もう限界なのに「頑張れ」と言われる"}]
            .map(o=>`<button class="diag-choice-btn ${s.diagChoice===o.id?"active":""}" onclick="selectDiag('${o.id}')">${o.text}</button>`).join("")}

        <div class="mirror-echo">&#8220;${esc(s.diagFreeText)}&#8221;</div>
        <div class="mirror-line"></div>
        <div class="mirror-response-text">${getMirrorResponse(s.diagChoice)}</div>
        <div class="mirror-verdict">それは、しつけの問題ではありません。</div>
      </div>
      <button class="onboard-next" style="margin-top:14px" onclick="setState({onboardStep:1})">続きを読む</button>

    <button class="onboard-skip" onclick="setState({onboarding:false})">スキップ</button>`;
  } else if(s.onboardStep===1){
    inner=`<div class="onboard-tag">伝えたいこと</div>
    <div class="diag-response-line"></div>
    <div class="onboard-headline">それは、<br>しつけの問題では<br>ありません。</div>
    <div class="onboard-body">${getStep1Body(s.diagChoice)}</div>
    <div class="onboard-accent">これは、構造の問題です。構造は、変えられます。</div>
    <button class="onboard-next" onclick="setState({onboardStep:2})">続きを読む</button>`;
  } else {
    inner=`<div class="onboard-tag">根拠</div>
    <div class="onboard-headline">親の感情の安定が、<br>子どもの未来を変える。</div>
    <div class="onboard-body">研究が示しているのは、子どもへの最大の介入は「声かけの技術」ではなく「養育者の感情的安定」です。あなたが整うことが、子どもにとっての安全基地になります。</div>
    <div class="diag-science-row">
      <div class="diag-science-item"><div class="diag-science-num">78%</div><div class="diag-science-text">の保護者が最初、自分のしつけが原因だと思っていた</div></div>
      <div class="diag-science-item"><div class="diag-science-num">14日</div><div class="diag-science-text">の記録で苛立ちの強度が平均1.2下がる</div></div>
    </div>
    <button class="onboard-start" onclick="setState({onboarding:false})">今日から、はじめる</button>`;

  return `<div class="onboard-overlay"><div class="onboard-card">${inner}</div></div>`;

    ${s.emergencyOpen?buildEmergency():""}

          <div class="header-label">Emotional Resilience</div>

      <div class="predict-card active">
        <div class="predict-row"><span class="predict-tag">Today's Prediction</span><span class="predict-conf" style="color:var(--sage)">パターン確立</span></div>
        <div class="predict-alert"><div class="predict-dot"></div><div class="predict-alert-text">今日の<strong>20時台は要注意ゾーン</strong>です。</div></div>
        <div class="predict-detail">火曜20時台に「YouTubeをやめない」で強度5を記録するパターンがあります。事前に呼吸法を1回しておくと、閾値を超えにくくなります。</div>

      ${s.tab==="guide"  ?buildGuide()  :""}

        .map(t=>`<button class="nav-btn ${s.tab===t.id?"active":""}" onclick="switchTab('${t.id}')">
          ${s.tab===t.id?'<div class="nav-line"></div>':""}

          <div class="nav-label">${t.label}</div>

}

// ─── OBSERVE ───
function buildObserve(){
  const s=state;
  return `
    <div class="section-label">今の状態を観察する</div>
    ${buildWelcomeReturn()}
    ${!s.logged?buildPreLog():buildPostLog()}
    ${buildHistorySection()}`;
}

// ①: 再訪カード（診断コンテキスト引継ぎ）
function buildWelcomeReturn(){
  const s=state;
  if(s.welcomeCardDismissed||s.logged) return "";
  const recentLetter=s.userLetters.filter(l=>l.daysAgo>0)[0];
  // ①: 孤独の「今日」に共鳴する文（diagChoiceと毎回の記録前に連動）
  const diagContext=s.diagChoice?{
    shituke:"「しつけの問題かもしれない」という問いを、今日もまた抱えてここに来ましたか。",
    iraira: "怒鳴ってしまった後の、あの重さを——また一人で持ってここに来ましたか。",
    hitori: "誰にも言えないままで、それでも今日もここを開いた。",
    mirai:  "子どもの先が見えない不安を、今日も一人で背負いながら来ましたか。",
    tsukare:"もう限界だと思いながら、それでも向き合おうとして、今日もここに来た。",
  }[s.diagChoice]:"今日も、ここに来た。あなたのことを覚えています。";
  // 今日起きたことへの問いかけ（記録前に「今日の孤独」を名指しする）
  const todayQ=s.diagChoice?{
    shituke:"今日、また「自分のせいかも」と思う場面がありましたか？",
    iraira: "今日、また怒鳴ってしまいましたか？それとも少し耐えられましたか？",
    hitori: "今日もまだ、誰にも言えていませんか？",
    mirai:  "今日も、子どもの将来のことが頭を離れませんでしたか？",
    tsukare:"今日の疲れは、昨日より重いですか、軽いですか？",
  }[s.diagChoice]:"今日のあなたは、どんな一日でしたか？";
  return `
    <div class="welcome-return-card">
      <div style="flex:1">
        <div class="welcome-return-tag">今日も来た — ${s.totalRecordCount}日目</div>
        <div class="welcome-return-line">
          ${diagContext}
          <div style="margin-top:8px;font-size:11px;color:var(--terra-light);letter-spacing:0.06em;font-style:italic;font-family:'Cormorant Garamond',serif">${todayQ}</div>
          ${recentLetter?`<div style="margin-top:8px;font-size:11px;color:var(--sage);letter-spacing:0.04em;font-style:italic">3日前の言葉：「${esc(recentLetter.word)}」</div>`:""}
        </div>
      </div>
      <button class="welcome-return-close" onclick="setState({welcomeCardDismissed:true})">✕</button>
    </div>`;
}

// ③: 昨日のアクション結果報告カード
function buildActionFeedbackCard(){
  const s=state;
  // ③: 昨日の子どもの観察を最初に表示（具体的な行動変化の蓄積）
  const prevObs=s.lastChildObservation?.trim();
  const obsHtml=prevObs?`<div style="background:rgba(122,158,142,0.06);border:1px solid rgba(122,158,142,0.15);border-radius:3px;padding:9px 11px;margin-bottom:11px;font-size:12px;color:var(--stone-light);line-height:1.7;letter-spacing:0.04em"><span style="font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.22em;color:var(--sage);text-transform:uppercase;display:block;margin-bottom:5px">昨日あなたが気づいた変化</span>${esc(prevObs)}</div>`:"";
  if(s.actionFeedbackAnswered && s.actionFeedbackAnswer){
    const msgs={
      good:`<div class="action-feedback-result good">変化が生まれた。その一瞬が、子どもの日常に刻まれています。<br>「また今日も」の積み重ねが、二次障害を予防します。</div>`,
      same:`<div class="action-feedback-result same">変わらない日もある。子どもが変化を処理している期間です。続けることに意味があります。</div>`,
      unknown:`<div class="action-feedback-result unknown">わからなくていい。今日の観察が、明日の手がかりになります。</div>`,
    };
    return `<div class="action-feedback-card"><div class="action-feedback-tag">Yesterday's Result</div>${obsHtml}${msgs[s.actionFeedbackAnswer]}</div>`;
  }
  return `
    <div class="action-feedback-card">
      <div class="action-feedback-tag">Yesterday's Result</div>
      ${obsHtml}
      <div class="action-feedback-q">昨日試したことの結果を教えてください。</div>
      <div class="action-feedback-action">「${LAST_ACTION_LOG.action}」</div>
      <div class="action-feedback-btns">
        <button class="action-feedback-btn ${s.actionFeedbackAnswer==="good"?"selected-good":""}" onclick="answerFeedback('good')">変化があった</button>
        <button class="action-feedback-btn ${s.actionFeedbackAnswer==="same"?"selected-same":""}" onclick="answerFeedback('same')">変わらなかった</button>
        <button class="action-feedback-btn ${s.actionFeedbackAnswer==="unknown"?"selected-unknown":""}" onclick="answerFeedback('unknown')">わからない</button>
      </div>
    </div>`;
}

function buildPreLog(){
  const s=state;
  if(!s.gatewayDone){
    if(s.gatewayPending) return buildGatewayMirror();
    return buildGateway();
  }
  return buildDetailedLog();
}

function buildGateway(){
  return `<div class="gateway-wrap">
    <div class="gateway-q">今、どんな感じですか？</div>
    <div class="gateway-sub">タップして、今の状態を観察しましょう。</div>
    <div class="gateway-grid">
      ${GATEWAY_OPTIONS.map(o=>`<button class="gateway-btn" onclick="selectGateway('${o.id}')">
        <span class="gateway-emoji">${o.emoji}</span>
        <span class="gateway-label">${o.label}</span>
      </button>`).join("")}
    </div>
    <button class="gateway-detail" onclick="setState({gatewayDone:true})">もっと詳しく記録したい →</button>
  </div>`;
}

      <div style="font-size:12px;color:var(--stone-light);line-height:1.85;letter-spacing:0.05em">${
        {irritated:"今日ここを開いた。それだけで、子どもへの次の声かけが変わります。",

         tired:"疲れを記録した。自分の状態を知ること——それが、余裕の始まりです。",
         sad:"落ち込みを外に出した。抱え込まなかった、その選択が子どもに届きます。",

         calm:"安穏を感じている。今のあなたの状態が、そのまま子どもに伝わっています。",

function buildDetailedLog(){
  const s=state;
  return `<div style="animation:fadeUp 0.35s ease">
    <div class="emotion-grid">
      ${EMOTIONS.map(e=>`<button class="emotion-btn ${s.selectedEmotion?.id===e.id?"active":""}" onclick="selectEmotion('${e.id}')">
        <span class="emotion-kanji" style="color:${e.color}">${e.kanji}</span>
        <span class="emotion-label">${e.label}</span>
      </button>`).join("")}
    </div>
    ${s.selectedEmotion?`
      <div class="narrator-strip">${REALTIME_NARRATOR.emotion[s.selectedEmotion.id]||""}</div>
      <div class="intensity-wrap">
        <div class="intensity-label"><span>強度</span><span style="font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--cream)">${s.intensity}</span></div>
        <input type="range" min="1" max="5" value="${s.intensity}" oninput="setState({intensity:parseInt(this.value)})">
        <div style="font-size:11px;color:var(--stone-light);line-height:1.7;letter-spacing:0.04em;margin-top:7px;font-style:italic">${REALTIME_NARRATOR.intensity[s.intensity]||""}</div>
      </div>
      <div style="margin-bottom:13px">
        <div class="section-label" style="margin-bottom:9px">きっかけ（複数可）</div>
        <div class="trigger-tags">
          ${TRIGGERS.map(t=>`<button class="trigger-tag ${s.selectedTriggers.includes(t)?"active":""}" onclick="toggleTrigger('${esc(t)}')">${t}</button>`).join("")}
        </div>
        ${s.selectedTriggers.length>0?`<div class="not-fault"><strong>これは、しつけの問題ではありません。</strong>子どもの行動と、あなたの感情反応の間には、変えられる構造があります。</div>`:""}
      </div>
      <textarea class="memo-textarea" placeholder="今日のメモ（任意）" rows="2" maxlength="200" oninput="setState({memo:this.value})">${esc(s.memo)}</textarea>
      <div class="memo-char">${s.memo.length}/200</div>
      <button class="log-btn" onclick="handleLog()">記録する</button>
    `:""}
  </div>`;
}

function buildPostLog(){
  const s=state;
  const emo=s.selectedEmotion;
  const trigger=s.selectedTriggers[0]||"default";
  const tomorrow=TOMORROW_ACTIONS[trigger]||TOMORROW_ACTIONS.default;
  const todayCareNames=s.checkedWorks.map(id=>SHADOW_WORKS.find(w=>w.id===id)?.name).filter(Boolean);
  const h=new Date().getHours();
  const timeDesc=h<9?"朝":h<12?"午前中":h<17?"午後":"夜";
  const diagSuffix={shituke:"ずっと「自分のせいかもしれない」と思いながら、",iraira:"怒鳴ってしまった後の自己嫌悪も抱えながら、",hitori:"誰にも言えないまま、",mirai:"子どもの将来への不安も背負いながら、",tsukare:"限界を超えても止まれないまま、"}[s.diagChoice]||"";
  const narrative=`${timeDesc}、${s.selectedTriggers.length>0?s.selectedTriggers[0]+"の場面で、":""}強度${s.intensity}の${emo?.kanji}を感じた。${diagSuffix}それを、一人で抱えていた。`;

  if(s.energyLevel===null){
    return buildEnergySelector(emo,todayCareNames);
  }

  let html=`<div style="display:flex;flex-direction:column;gap:13px">`;
  if(!s.breathSkipped) html+=buildBreathCard();
  if(s.breathSkipped||s.breathDone) html+=buildCoreCard(narrative,emo,s);
  if(s.selfWordFinalSaved&&s.energyLevel===1){
    html+=`<button class="session-close-btn" onclick="setState({sessionComplete:true})">今日のセッションを完了する</button>`;
  }
  if(s.energyLevel>=2&&s.selfWordFinalSaved) html+=buildLevel2(emo,trigger,todayCareNames);
  if(s.energyLevel>=3&&s.selfWordFinalSaved) html+=buildLevel3(emo,trigger,tomorrow);
  html+=`</div>`;
  return html;
}

// ③: 「今日なぜしんどいか」の構造説明（原因がわかる体験を疲弊者にも届ける）

        :"「しつけが悪いのかも」という問いは、あなたが深く子どもと向き合っているからこそ生まれます。今日の感情はその証拠です。",

      tired:"怒鳴った後の疲弊。感情を制御しようとするのにエネルギーを使い果たした状態です。これは弱さではなく、消耗の結果です。",
      default:"怒鳴ってしまう場面には、必ず「構造的な引き金」があります。今日記録したことが、その構造を見える化します。",
    },
    hitori:{
      irritated:"誰にも言えないまま、一人でイライラを抱えてきた。孤立した状態での感情調整は、人間の設計を超えた要求です。",
      tired:"誰にも言えないまま疲弊している。それは「弱さ」ではなく、サポート不足という構造の問題です。",
      default:"今日も一人で抱えてここに来た。「誰にも言えない」の重さが、今日の感情に乗っています。",
    },
    mirai:{
      anxious:intensity>=4
        ?"子どもの将来への不安が強い日。先が見えないときの脳は、最悪のシナリオを描き続けます。それは「心配性」ではなく、不確実性への正常反応です。"
        :"子どもの将来を考えながら来た。その不安は、あなたが長期的に子どもを思いやっている証です。",
      default:"将来への不安を抱えながら今日も動いた。それは愛情の別名です。",
    },
    tsukare:{
      tired:intensity>=4
        ?"限界を超えて動き続けている。今日の疲弊は、意志の弱さではなく、消耗のシグナルです。このシグナルに気づけたことが、今日最大の成果です。"
        :"限界に近い状態で来た。その勇気を、まず認めてください。",

    },
  };
  const diagInsights=insightMap[diagChoice];
  let insight=null;

  }
  // diagChoiceなし時のフォールバック
  // 全ユーザーに「今日なぜしんどいか」を届ける（感情×強度×トリガー×時刻の4軸）
  if(!insight){
    const h=new Date().getHours();
    const isMorning=h>=5&&h<10;
    const isNight=h>=21||h<2;

    const triggerInsight={
      "YouTubeをやめない":"「やめない」のはあなたへの反抗ではなく、子どもの脳が「切り替え」を苦手とする特性です。何度言っても変わらないのは、伝え方の問題ではなく、神経発達の問題です。",

      "登校拒否":"登校拒否は「行きたくない」ではなく「行けない」ケースがほとんどです。これはあなたの育て方の結果ではなく、子どもの神経系が過負荷を知らせているサインです。",
      "癇癪":"癇癪は子どもの感情調整回路が未発達なために起きます。叱ることで治るものではなく、回路の発達を待つ必要があります。あなたの対応が原因ではありません。",
      "宿題":"宿題への抵抗は、「やる気がない」ではなく「処理負荷が高い」ためである場合が多いです。強制しても消耗が増えるだけで、子どもの意欲の問題ではありません。",
      "食事拒否":"食事拒否は感覚過敏や自律神経の状態と関係していることが多く、しつけでは解決できません。あなたの料理や育て方の問題ではありません。",
    }[trigger];
    // 感情×強度のフォールバック
    const emoInsight={
      irritated:{
        hi:intensity>=4?"強い苛立ちは、神経系が限界に近づいているサインです。怒りやすくなっているのは、あなたの性格ではなく消耗の結果です。":"苛立ちを感じた。その下に「こうあってほしい」という願いがあります。その願いは正当です。",
        lo:"苛立ちに気づいた。感情を観察できているということは、少し距離が取れているサインです。",

      },
      tired:{

      calm:{hi:"安穏を感じている。この状態のあなたが、子どもにとっての安全基地になっています。"},

    const emoFallback=emoEntry?(emoEntry.hi||emoEntry.lo||null):null;
    insight=triggerInsight||(isNight&&intensity>=4?`夜の${h}時に強度${intensity}の感情。夜は感情の閾値が下がりやすい時間帯です。今感じていることの強さは、夜という時間が増幅している部分があります。`:emoFallback);

}
function getStep1Body(choice){
  return {shituke:"あなたが怒るのは、脳の特性・構造的な過負荷・睡眠不足が重なっているからです。あなたの人格の問題ではありません。",iraira:"怒鳴ってしまうのは、感情調整のリソースが枯渇しているサインです。意志の力で抑えようとするほど、次の爆発は強くなります。",hitori:"「誰にも言えない」のは、あなたが弱いからではなく、言える場所がないからです。このアプリが、その場所になります。",mirai:"将来への不安は、深く愛しているからこそ生まれます。ただ、不安のまま関わると子どもに伝わります。今必要なのは、答えではなく安定です。",tsukare:"「頑張れ」はあなたへの最も残酷な言葉です。今必要なのは、頑張ることではなく回復することです。"}[choice]||"子どもの脳の特性、生活構造の歪み、そして積み重なった疲弊。あなたがイライラするのは、状況が過負荷だからです。";
}
function getScaffolds(s){
  const ladderId=s.ladderChoice?.id||"default";
  const base=SCAFFOLD_AFFIRMATIONS[ladderId]||SCAFFOLD_AFFIRMATIONS.default;
  // ②: diagChoice×感情×強度の3軸で承認文を生成（完全連動）
  const emoId=s.selectedEmotion?.id||"";
  const hi=s.intensity>=4;
  const diagEmoExtra={
    shituke:{
      irritated:hi?["「しつけが悪いのかも」と思いながら、それでも子どもと向き合い続けた。","怒りを感じた、その下に深い愛情がある。"]:["しつけへの不安を感じながら、今日も来た。","構造を知れば、変えられる。"],
      tired:    hi?["限界まで動きながら、「自分のせいかも」と思い続けた。","消耗の中で自責する——それは誠実さの証だ。"]:["疲れながらも、向き合おうとしている。"],
      default:  ["「しつけの問題」と思うほど、深く向き合っている。","私が悩むのは、子どもを愛しているからだ。"],
    },
    iraira:{
      irritated:hi?["怒鳴ってしまった。そして今日もここに来た。それが誠実さだ。","爆発した後に反省できる、それは愛情の証だ。"]:["少し耐えられた。昨日より一回少なかった。","怒りに気づけた。それが変化の始まりだ。"],
      default:  ["怒鳴った後に自己嫌悪する、その誠実さが今日のあなただ。","完璧な親はいない。今日もそこにいた。"],
    },
    hitori:{
      default:  ["誰にも言えないまま、ここには来た。それで十分だ。","一人で抱えてきた重さを、今日ここに置いた。","孤独の中で、それでも子どもと向き合い続けた。"],
    },
    mirai:{
      anxious:  hi?["将来への不安が強い。その分、深く愛している。","不安なのは、子どもの人生を真剣に考えているからだ。"]:["不安を感じながら、今日もここに来た。","先が見えなくても、今日一日は向き合えた。"],
      default:  ["不安は愛情の裏返しだ。今日もここに来た。","答えがなくても、向き合い続けている。"],
    },
    tsukare:{
      tired:    hi?["限界を超えて動いた。それがあなたの今日の事実だ。","疲弊を感じるほど、誰かのために使い続けた。"]:["体が悲鳴を上げている。それを聞けた、それが今日の記録だ。"],
      default:  ["頑張りすぎた。それもまた、今日の事実として認める。","限界でも向き合おうとした。それが変容の種だ。"],
    },
  };
  const diagExtra=(diagEmoExtra[s.diagChoice]?.[emoId]||diagEmoExtra[s.diagChoice]?.default||
    ["しつけが悪いのではない。構造が過負荷なのだ。","私が怒るのは、愛しているからだ。"]);
  return [...diagExtra,...base].slice(0,4);
}

// ═══════════════════ HANDLERS ═══════════════════
function switchTab(tab){setState({tab});}
function submitDiagText(){
  const t=state.diagFreeText;
  let c="iraira";
  if(/しつけ|育て方|私のせい|私が悪/.test(t))c="shituke";
  else if(/怒鳴|叫|キレ|爆発|自己嫌悪/.test(t))c="iraira";
  else if(/誰にも|一人で|孤独|言えな/.test(t))c="hitori";
  else if(/将来|不安|心配|どうなる/.test(t))c="mirai";
  else if(/限界|疲れ|もう無理|消耗/.test(t))c="tsukare";
  setState({diagChoice:c,diagMirrorShown:true});
}
function selectDiag(id){setState({diagChoice:id});setTimeout(()=>setState({onboardStep:1}),350);}
function selectGateway(id){
  const opt=GATEWAY_OPTIONS.find(o=>o.id===id);
  const emo=EMOTIONS.find(e=>e.id===opt.mapTo);
  setState({selectedEmotion:emo,intensity:opt.intensity,gatewayPending:{emoji:opt.emoji,emo,intensity:opt.intensity}});
}
function confirmGateway(){
  setState({logged:true,gatewayDone:true,gatewayPending:null});
  setTimeout(()=>setState({breathActive:true,breathPhase:"inhale",breathCount:0}),700);
}
function selectEmotion(id){setState({selectedEmotion:EMOTIONS.find(e=>e.id===id)});}
function toggleTrigger(t){
  const arr=state.selectedTriggers;
  setState({selectedTriggers:arr.includes(t)?arr.filter(x=>x!==t):[...arr,t]});
}
function handleLog(){
  if(!state.selectedEmotion) return;
  const newCount=state.totalRecordCount+1;
  const ms=MILESTONES[newCount];
  setState({logged:true,totalRecordCount:newCount,practiceReportShown:state.cbtPracticed});
  if(ms) setTimeout(()=>setState({milestoneFlash:ms}),500);
}
function selectEnergy(v){setState({energyLevel:v});}
function startBreath(){
  setState({breathActive:true,breathPhase:"inhale",breathCount:0});
  runBreath();
}
function runBreath(){
  clearTimeout(breathTimer);
  const cycle=[{p:"inhale",d:4000},{p:"hold",d:2000},{p:"exhale",d:6000}];
  let step=0;
  function next(){
    if(!state.breathActive) return;
    if(step>=cycle.length){
      const c=state.breathCount+1;
      if(c>=3){setState({breathDone:true,breathActive:false});return;}
      setState({breathCount:c,breathPhase:"inhale"});step=0;
    }
    setState({breathPhase:cycle[step].p});
    breathTimer=setTimeout(()=>{step++;next();},cycle[step].d);
  }
  next();
}
function selectScaffold(a){setState({scaffoldChoice:a,selfWordFinal:a});}
function saveWord(level){
  const word=state.selfWordFinal.trim();
  if(!word) return;
  const newLetters=[{daysAgo:0,emotion:state.selectedEmotion?.label||"",trigger:state.selectedTriggers[0]||"",word},...state.userLetters].slice(0,10);
  setState({selfWordFinalSaved:true,userLetters:newLetters,wordReceivedFlash:true});
  setTimeout(()=>setState({wordReceivedFlash:false}),3200);
  if(level===1) setTimeout(()=>setState({sessionComplete:true}),1000);
}
function reportPractice(answer){setState({practiceReported:answer});}
function answerFeedback(answer){setState({actionFeedbackAnswer:answer,actionFeedbackAnswered:true});}
function completeCBT(){setState({cbtDone:true,cbtPracticed:true});}
function dismissMilestone(){setState({milestoneFlash:null});}
function closeSessionWithObs(){
  const obs=state.childObservation?.trim()||"";
  setState({sessionComplete:false,communityFlash:true,lastChildObservation:obs,childObservation:""});
  setTimeout(()=>setState({
    communityFlash:false,logged:false,selectedEmotion:null,selectedTriggers:[],
    intensity:3,memo:"",energyLevel:null,gatewayDone:false,gatewayPending:null,
    breathActive:false,breathDone:false,breathSkipped:false,breathCount:0,
    scaffoldChoice:null,selfWordFinal:"",selfWordFinalSaved:false,scaffoldHintsOpen:false,writingFeedback:false,
    practiceReported:null,welcomeCardDismissed:false,
  }),1800);
}
function closeSession(){closeSessionWithObs();}
function toggleWork(id){
  const w=SHADOW_WORKS.find(x=>x.id===id);
  const arr=state.checkedWorks;
  setState({checkedWorks:arr.includes(id)?arr.filter(x=>x!==id):[...arr,id],totalPts:state.totalPts+(arr.includes(id)?-(w?.pts||0):(w?.pts||0))});
}
function toggleFaq(i){setState({openFaq:state.openFaq===i?null:i});}

// ═══════════════════ INIT ═══════════════════
render();
</script>
