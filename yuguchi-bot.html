<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>壁打ちボット｜survival_mam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&display=swap');

  :root {
    --cream: #faf7f2;
    --terra: #c4814a;
    --terra-light: #d9a278;
    --terra-dark: #a06535;
    --navy: #1a1410;
    --text-muted: #9c8478;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--navy);
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--cream);
    overflow: hidden;
  }

  #starfield {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(196,129,74,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(196,129,74,0.05) 0%, transparent 40%),
      var(--navy);
  }
  #starfield::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(250,247,242,0.6), transparent),
      radial-gradient(1px 1px at 35% 45%, rgba(250,247,242,0.4), transparent),
      radial-gradient(1.5px 1.5px at 60% 10%, rgba(250,247,242,0.7), transparent),
      radial-gradient(1px 1px at 75% 60%, rgba(250,247,242,0.3), transparent),
      radial-gradient(1px 1px at 90% 30%, rgba(250,247,242,0.5), transparent),
      radial-gradient(1px 1px at 10% 70%, rgba(250,247,242,0.4), transparent),
      radial-gradient(1.5px 1.5px at 50% 80%, rgba(250,247,242,0.5), transparent),
      radial-gradient(1px 1px at 25% 90%, rgba(250,247,242,0.3), transparent),
      radial-gradient(1px 1px at 45% 35%, rgba(250,247,242,0.3), transparent),
      radial-gradient(1px 1px at 70% 75%, rgba(250,247,242,0.5), transparent);
  }

  #app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100dvh;
    max-width: 640px;
    margin: 0 auto;
  }

  /* ── ヘッダー ── */
  header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(196,129,74,0.2);
    background: rgba(26,20,16,0.85);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left {}
  .header-brand {
    font-family: 'Noto Serif JP', serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--terra-light);
    margin-bottom: 3px;
  }
  .header-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--cream);
    letter-spacing: 0.04em;
  }
  .header-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: #6fcf97;
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse-dot 2.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* ── メッセージエリア ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(196,129,74,0.3); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: msg-in 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .avatar.bot {
    background: linear-gradient(135deg, var(--terra-dark), var(--terra));
    border: 1px solid rgba(196,129,74,0.4);
  }
  .avatar.user-av {
    background: rgba(250,247,242,0.12);
    border: 1px solid rgba(250,247,242,0.15);
    font-size: 13px;
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.75;
    letter-spacing: 0.02em;
    white-space: pre-wrap;
  }
  .msg.bot .bubble {
    background: rgba(45,36,32,0.9);
    border: 1px solid rgba(196,129,74,0.2);
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--terra), var(--terra-dark));
    border-bottom-right-radius: 4px;
  }

  .typing-bubble {
    background: rgba(45,36,32,0.9);
    border: 1px solid rgba(196,129,74,0.2);
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    border-radius: 18px;
    display: flex; gap: 5px; align-items: center;
  }
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--terra-light);
    border-radius: 50%;
    animation: typing-bounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing-bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── 入力エリア ── */
  #input-area {
    padding: 10px 16px 14px;
    border-top: 1px solid rgba(196,129,74,0.15);
    background: rgba(26,20,16,0.92);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  #shortcuts {
    display: flex; gap: 7px; flex-wrap: wrap;
    margin-bottom: 9px;
  }
  .shortcut-btn {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(196,129,74,0.35);
    background: rgba(196,129,74,0.08);
    color: var(--terra-light);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .shortcut-btn:hover { background: rgba(196,129,74,0.2); border-color: rgba(196,129,74,0.6); }

  #voice-preview {
    font-size: 12px;
    color: var(--terra-light);
    min-height: 16px;
    margin-bottom: 6px;
    font-style: italic;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #voice-preview.active { opacity: 1; }

  #input-row {
    display: flex; gap: 10px; align-items: flex-end;
  }
  #user-input {
    flex: 1;
    background: rgba(250,247,242,0.06);
    border: 1px solid rgba(196,129,74,0.25);
    border-radius: 22px;
    padding: 11px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--cream);
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  #user-input::placeholder { color: var(--text-muted); }
  #user-input:focus { border-color: rgba(196,129,74,0.55); }

  #mic-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(196,129,74,0.35);
    background: rgba(196,129,74,0.08);
    color: var(--terra-light);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  #mic-btn:hover { background: rgba(196,129,74,0.18); }
  #mic-btn.recording {
    background: rgba(196,74,74,0.2);
    border-color: rgba(220,80,80,0.7);
    color: #e87070;
    animation: mic-pulse 1.2s ease-in-out infinite;
  }
  @keyframes mic-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(220,80,80,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(220,80,80,0); }
  }

  #send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--terra), var(--terra-dark));
    color: var(--cream);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
    box-shadow: 0 2px 12px rgba(196,129,74,0.35);
  }
  #send-btn:hover { transform: scale(1.08); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .footer-note {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 8px;
    letter-spacing: 0.03em;
  }

  .divider {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 0;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(196,129,74,0.2); }
  .divider-text { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; }
</style>
</head>
<body>
<div id="starfield"></div>

<div id="app">
  <header>
    <div class="header-left">
      <div class="header-brand">SURVIVAL_MAM</div>
      <div class="header-title">
        <span class="status-dot"></span>壁打ちボット
      </div>
      <div class="header-sub">完全匿名・正論なし・いつでも</div>
    </div>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <div id="shortcuts">
      <button class="shortcut-btn" onclick="quickSend('もう疲れた…')">もう疲れた…</button>
      <button class="shortcut-btn" onclick="quickSend('夫にイライラする')">夫にイライラ</button>
      <button class="shortcut-btn" onclick="quickSend('子どもに怒鳴ってしまった')">怒鳴ってしまった</button>
      <button class="shortcut-btn" onclick="quickSend('眠れない')">眠れない</button>
      <button class="shortcut-btn" onclick="quickSend('誰もわかってくれない')">誰もわかってくれない</button>
    </div>
    <div id="voice-preview"></div>
    <div id="input-row">
      <button id="mic-btn" title="音声で話す">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <textarea id="user-input" rows="1" placeholder="なんでも吐き出してください。どんな言葉でも受け止めます。"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="送信">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="footer-note">ここでの内容は誰にも見えません。あなただけの場所です。</div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `あなたは「survival_mam」の愚痴聞きチャットボットです。

【あなたの役割】
発達グレーゾーンの子どもを持つ母親、不登校の子どもを持つ親、ワンオペで疲弊している保護者が、
深夜に本音を吐き出す場所です。

【絶対に守るルール】
1. 正論・アドバイス・解決策を出さない。相手が求めていない限り。
2. 「頑張って」「大丈夫」「お母さんだから」などの言葉で追い詰めない。
3. 感情を否定しない。「そんなこと思っちゃダメ」は絶対に言わない。
4. ジャッジしない。どんな感情（子どもへの怒り、夫への憎しみ、育児放棄したいという気持ち）も受け止める。
5. ただひたすら「聴く」「共感する」「一緒にいる」ことに徹する。

【会話スタイル】
- 短めの返答でよい。長々と説明しない。
- 相手の言葉をそのまま受け止めて「そうか、〜なんだね」と反映する。
- 問いかけは1つだけ。複数の質問は圧力になる。
- 深夜に一人で泣いている人に寄り添う、静かで温かいトーンで。
- 絵文字は使わない。

【重要な注意】
もし相手が自傷や自殺を示唆する言葉を使った場合は、
寄り添いながら「一人で抱えないでほしい」と伝え、
よりそいホットライン（0120-279-338）を優しく案内してください。`;

let conversationHistory = [];
let isTyping = false;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

// ── チャット初期化 ──
async function initChat() {
  await new Promise(r => setTimeout(r, 500));
  showTyping();
  await new Promise(r => setTimeout(r, 1200));
  hideTyping();

  const hour = new Date().getHours();
  let greeting;
  if (hour >= 22 || hour < 5) {
    greeting = 'こんな時間に来てくれたんだね。\n\n眠れないのかな、それとも…やっと一人になれた時間かな。\n\nどんなことでもいいよ。何があったの？';
  } else if (hour < 12) {
    greeting = 'おはよう。\n\n朝から来てくれたんだね。今日はもう何かあった？\n\nなんでも話してほしい。';
  } else {
    greeting = 'ここに来てくれてよかった。\n\n今日はどんな一日だった？何があったの？';
  }
  addMessage('bot', greeting);
}

// ── メッセージ表示 ──
function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function addMessage(role, text) {
  const wrapper = document.createElement('div');
  wrapper.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = `avatar ${role === 'bot' ? 'bot' : 'user-av'}`;
  av.textContent = role === 'bot' ? '🌙' : '💬';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  if (role === 'bot') { wrapper.appendChild(av); wrapper.appendChild(bubble); }
  else { wrapper.appendChild(av); wrapper.appendChild(bubble); }

  messagesEl.appendChild(wrapper);
  scrollToBottom();
}

function showTyping() {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg bot'; wrapper.id = 'typing-indicator';
  const av = document.createElement('div');
  av.className = 'avatar bot'; av.textContent = '🌙';
  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  wrapper.appendChild(av); wrapper.appendChild(bubble);
  messagesEl.appendChild(wrapper); scrollToBottom();
}
function hideTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

function addDivider(text) {
  const div = document.createElement('div');
  div.className = 'divider';
  div.innerHTML = `<div class="divider-line"></div><div class="divider-text">${text}</div><div class="divider-line"></div>`;
  messagesEl.appendChild(div);
}

// ── API呼び出し（Gemini） ──
const WORKER_URL = 'https://twilight-poetry-6783.sr-g-solti.workers.dev';

async function callClaude(userMessage) {
  conversationHistory.push({ role: 'user', parts: [{ text: userMessage }] });

  // Gemini形式に変換
  const geminiMessages = conversationHistory.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: m.parts || [{ text: m.content || '' }]
  }));

  const response = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: geminiMessages,
      generationConfig: { maxOutputTokens: 1000 }
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${response.status}`);
  }
  const data = await response.json();
  const reply = data.candidates[0].content.parts[0].text;
  conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
  return reply;
}

async function sendMessage(text) {
  const message = text || inputEl.value.trim();
  if (!message || isTyping) return;

  if (!text) { inputEl.value = ''; inputEl.style.height = 'auto'; }
  isTyping = true; sendBtn.disabled = true;

  if (conversationHistory.length === 0) addDivider('今夜の壁打ち');

  addMessage('user', message);
  showTyping();

  try {
    const reply = await callClaude(message);
    hideTyping();
    addMessage('bot', reply);
  } catch (e) {
    hideTyping();
    addMessage('bot', `接続できませんでした。\n\nエラー: ${e.message}\n\nAPIキーやネットワークを確認してください。`);
  }

  isTyping = false; sendBtn.disabled = false; inputEl.focus();
}

function quickSend(text) { sendMessage(text); }

// テキストエリア自動リサイズ
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── 音声入力 ──
const micBtn = document.getElementById('mic-btn');
const voicePreview = document.getElementById('voice-preview');
let recognition = null;
let isRecording = false;

(function setupSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { micBtn.style.opacity = '0.3'; micBtn.title = 'このブラウザでは音声入力非対応（Chrome推奨）'; return; }

  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true; micBtn.classList.add('recording');
    voicePreview.textContent = '🎙 聞いています…'; voicePreview.classList.add('active');
  };
  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t; else interim += t;
    }
    if (final) {
      inputEl.value += final;
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
      voicePreview.textContent = '✓ ' + final;
    } else { voicePreview.textContent = '🎙 ' + interim; }
  };
  recognition.onerror = (e) => {
    voicePreview.textContent = e.error === 'not-allowed' ? 'マイクの許可が必要です' : e.error === 'no-speech' ? '声が聞き取れませんでした' : '';
    stopRec();
  };
  recognition.onend = () => {
    stopRec();
    setTimeout(() => { voicePreview.classList.remove('active'); setTimeout(() => { voicePreview.textContent = ''; }, 300); }, 1500);
  };
})();

function stopRec() { isRecording = false; micBtn.classList.remove('recording'); }
micBtn.addEventListener('click', () => {
  if (!recognition) return;
  if (isRecording) recognition.stop();
  else { inputEl.value = ''; inputEl.style.height = 'auto'; try { recognition.start(); } catch(e) {} }
});

// 起動
window.addEventListener('load', () => initChat());
</script>
</body>
</html>
