<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>つながりログ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --cream: #faf7f2;
  --cream2: #f2ede4;
  --cream3: #e8e0d4;
  --terra: #c4814a;
  --terra2: #d4926b;
  --terra3: #a86030;
  --terra-pale: #f5e8d8;
  --navy: #1a1410;
  --navy2: #2e2318;
  --navy3: #4a3828;
  --text: #1a1410;
  --text2: #5a4538;
  --text3: #9a8070;
  --success: #5a8a5a;
  --success-pale: #e8f2e8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--cream);
  color:var(--text);
  font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;
  font-size:15px;line-height:1.7;
  min-height:100vh;
  padding-bottom:100px;
}

/* ── Header ── */
.hdr{
  background:var(--navy);
  padding:0 20px;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.hdr-brand{color:var(--terra2);font-size:10px;letter-spacing:.15em;text-transform:uppercase;opacity:.8}
.hdr-title{color:var(--cream);font-size:16px;font-weight:500;letter-spacing:.05em}
.hdr-date{color:var(--cream);font-size:11px;opacity:.5;text-align:right;line-height:1.4}

/* ── Bottom nav ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--navy);
  display:flex;
  z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
}
.bnav-btn{
  flex:1;background:none;border:none;
  color:rgba(255,255,255,.45);
  padding:12px 4px 10px;
  font-size:10px;letter-spacing:.04em;
  cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:color .2s;
}
.bnav-btn.active{color:var(--terra2)}
.bnav-icon{font-size:20px;line-height:1}

/* ── Pages ── */
.page{display:none;padding:0 0 20px}
.page.active{display:block}
.wrap{max-width:640px;margin:0 auto;padding:0 16px}

/* ── Page header ── */
.ph{padding:22px 0 16px}
.ph-title{font-size:20px;font-weight:500;color:var(--navy);margin-bottom:2px}
.ph-sub{font-size:13px;color:var(--text3)}

/* ── Card ── */
.card{
  background:#fff;
  border:1px solid var(--cream3);
  border-radius:16px;
  padding:18px 18px 16px;
  margin-bottom:14px;
}
.card-tag{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:var(--terra3);margin-bottom:12px;
}
.card-tag::before{content:'';width:3px;height:12px;background:var(--terra);border-radius:2px;display:block}

/* ── Condition picker ── */
.cond-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cond-btn{
  width:44px;height:44px;border-radius:50%;border:2px solid transparent;
  background:var(--cream2);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:16px;line-height:1;
  transition:all .15s;position:relative;
}
.cond-btn span{font-size:9px;color:var(--text3);margin-top:1px;line-height:1}
.cond-btn.sel{border-color:var(--terra);background:var(--terra-pale);transform:scale(1.08)}
.cond-selected-label{font-size:13px;color:var(--terra3);font-weight:500;margin-left:4px}

/* ── Mood tags ── */
.mood-wrap{display:flex;flex-wrap:wrap;gap:7px}
.mood-tag{
  background:var(--cream2);border:1.5px solid var(--cream3);
  border-radius:20px;padding:6px 14px;
  font-size:13px;color:var(--text2);cursor:pointer;
  transition:all .15s;font-family:inherit;
}
.mood-tag.sel{background:var(--terra);border-color:var(--terra);color:#fff}

/* ── できたこと ── */
.dekita-box{
  background:var(--success-pale);
  border:1.5px solid #c8e0c8;
  border-radius:12px;padding:14px 16px;
  margin-bottom:14px;
}
.dekita-label{font-size:12px;color:var(--success);font-weight:500;letter-spacing:.06em;margin-bottom:8px}
.dekita-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.dekita-chip{
  background:#fff;border:1.5px solid #c8e0c8;
  border-radius:20px;padding:5px 13px;
  font-size:13px;color:#3a6a3a;cursor:pointer;
  transition:all .15s;font-family:inherit;
}
.dekita-chip.sel{background:var(--success);border-color:var(--success);color:#fff}

/* ── Inputs ── */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg label{font-size:12px;color:var(--text2);font-weight:500}
.fg input,.fg textarea,.fg select{
  background:var(--cream);
  border:1px solid var(--cream3);
  border-radius:10px;
  padding:10px 13px;
  font-size:14px;font-family:inherit;color:var(--text);
  outline:none;transition:border-color .2s;resize:vertical;
}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--terra);background:#fff}
.fg textarea{min-height:72px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Buttons ── */
.btn-save{
  width:100%;background:var(--terra);color:#fff;
  border:none;border-radius:14px;padding:15px;
  font-size:15px;font-weight:500;cursor:pointer;
  font-family:inherit;letter-spacing:.04em;
  transition:background .2s;margin-top:4px;
}
.btn-save:active{background:var(--terra3)}
.btn-outline{
  background:transparent;color:var(--terra);
  border:1.5px solid var(--terra);
  border-radius:12px;padding:10px 20px;
  font-size:14px;font-weight:500;cursor:pointer;
  font-family:inherit;transition:all .2s;
}
.btn-outline:active{background:var(--terra);color:#fff}
.btn-sm{
  background:var(--terra-pale);color:var(--terra3);
  border:none;border-radius:8px;padding:6px 14px;
  font-size:12px;font-weight:500;cursor:pointer;
  font-family:inherit;
}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{
  background:#fff;border:1px solid var(--cream3);
  border-radius:12px;padding:14px 10px;text-align:center;
}
.stat-n{font-size:26px;font-weight:500;color:var(--terra)}
.stat-l{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Entry list ── */
.entry{
  background:#fff;border:1px solid var(--cream3);
  border-radius:14px;padding:16px 16px 14px;
  margin-bottom:10px;cursor:pointer;
  transition:box-shadow .15s;
}
.entry:active{box-shadow:0 2px 12px rgba(196,129,74,.2)}
.entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.entry-date-str{font-size:13px;font-weight:500;color:var(--terra3);display:flex;align-items:center;gap:6px}
.cdot{width:10px;height:10px;border-radius:50%;display:inline-block}
.entry-pills{display:flex;gap:5px;flex-wrap:wrap}
.epill{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:500}
.epill-terra{background:var(--terra-pale);color:var(--terra3)}
.epill-green{background:var(--success-pale);color:var(--success)}
.epill-navy{background:#e8e4e0;color:var(--navy3)}
.entry-preview{font-size:13px;color:var(--text2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── Empty ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:36px;opacity:.3;margin-bottom:14px}

/* ── Modal / sheet ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(26,20,16,.55);z-index:300;
  align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex}
.sheet{
  background:var(--cream);
  border-radius:22px 22px 0 0;
  padding:0 0 env(safe-area-inset-bottom);
  width:100%;max-width:640px;
  max-height:90vh;overflow-y:auto;
}
.sheet-handle{width:36px;height:4px;background:var(--cream3);border-radius:2px;margin:14px auto 0}
.sheet-inner{padding:16px 20px 32px}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sheet-title{font-size:17px;font-weight:500;color:var(--navy)}
.sheet-close{
  background:var(--cream2);border:none;border-radius:50%;
  width:32px;height:32px;font-size:16px;color:var(--text2);cursor:pointer;
}
.mf{margin-bottom:14px}
.mf-l{font-size:11px;color:var(--terra3);letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:4px}
.mf-v{font-size:14px;color:var(--text);line-height:1.7}
.del-btn{
  background:transparent;border:1px solid #e74c3c;color:#e74c3c;
  border-radius:10px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;margin-top:8px;
}

/* ── Share card (rendered to image) ── */
.share-card-wrap{overflow:hidden;height:0;position:absolute;left:-9999px;top:0}
.share-card{
  width:600px;
  background:var(--cream);
  font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;
  padding:0;
}
.sc-header{
  background:var(--navy);
  padding:24px 28px 20px;
  display:flex;align-items:flex-start;justify-content:space-between;
}
.sc-brand{color:var(--terra2);font-size:10px;letter-spacing:.15em;text-transform:uppercase;opacity:.8;margin-bottom:4px}
.sc-title{color:#fff;font-size:18px;font-weight:500}
.sc-dateblock{text-align:right}
.sc-date{color:#fff;font-size:13px;opacity:.9;font-weight:500}
.sc-day{color:var(--terra2);font-size:11px;margin-top:2px;opacity:.8}
.sc-body{padding:20px 28px 24px;display:flex;flex-direction:column;gap:14px}
.sc-section{background:#fff;border-radius:14px;padding:14px 18px;border:1px solid var(--cream3)}
.sc-sec-label{
  font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  color:var(--terra3);margin-bottom:10px;
  display:flex;align-items:center;gap:5px;
}
.sc-sec-label::before{content:'';width:3px;height:10px;background:var(--terra);border-radius:2px;display:block}
.sc-row{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:6px}
.sc-row-l{color:var(--text2)}
.sc-row-v{font-weight:500;color:var(--text)}
.sc-chips{display:flex;flex-wrap:wrap;gap:6px}
.sc-chip{background:var(--cream2);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text2)}
.sc-chip-green{background:var(--success-pale);color:var(--success)}
.sc-chip-terra{background:var(--terra-pale);color:var(--terra3)}
.sc-text{font-size:13px;color:var(--text);line-height:1.7}
.sc-footer{
  background:var(--navy2);
  padding:12px 28px;
  display:flex;align-items:center;justify-content:space-between;
}
.sc-footer-l{color:rgba(255,255,255,.45);font-size:10px;letter-spacing:.06em}
.sc-footer-r{color:var(--terra2);font-size:10px;opacity:.8}

/* ── Share page ── */
.share-preview{
  background:var(--cream2);border-radius:14px;
  padding:20px;margin-bottom:16px;
  display:flex;align-items:center;justify-content:center;
  min-height:120px;
}
.share-preview img{max-width:100%;border-radius:10px;box-shadow:0 4px 20px rgba(26,20,16,.15)}
.share-btns{display:flex;gap:10px;flex-wrap:wrap}
.share-btn{
  flex:1;min-width:120px;
  padding:13px 16px;border-radius:12px;border:none;
  font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.share-btn-line{background:#06C755;color:#fff}
.share-btn-dl{background:var(--terra);color:#fff}
.share-btn-copy{background:var(--navy);color:#fff}

/* ── Toast ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--navy);color:var(--cream);padding:11px 22px;border-radius:30px;
  font-size:13px;transition:transform .25s;z-index:999;pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* cond colors */
.cc1{background:#e74c3c}.cc2{background:#e67e22}.cc3{background:#f1c40f}
.cc4{background:#2ecc71}.cc5{background:#3498db}
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-brand">survival_mam</span>
  <span class="hdr-title">つながりログ</span>
  <span class="hdr-date" id="hdr-date"></span>
</header>

<!-- ═══════════════ PAGE: 記録 ═══════════════ -->
<section class="page active" id="pg-rec">
<div class="wrap">
  <div class="ph"><div class="ph-title">今日の記録</div><div class="ph-sub" id="rec-date-sub"></div></div>

  <div class="card">
    <div class="card-tag">体調・気分</div>
    <div class="fg"><label>体調レベル</label>
      <div class="cond-row" id="cond-row">
        <button class="cond-btn" data-v="1" onclick="selCond(1)">😞<span>つらい</span></button>
        <button class="cond-btn" data-v="2" onclick="selCond(2)">😟<span>しんどい</span></button>
        <button class="cond-btn" data-v="3" onclick="selCond(3)">😐<span>まあまあ</span></button>
        <button class="cond-btn" data-v="4" onclick="selCond(4)">🙂<span>いい感じ</span></button>
        <button class="cond-btn" data-v="5" onclick="selCond(5)">😄<span>元気</span></button>
        <span class="cond-selected-label" id="cond-lbl"></span>
      </div>
    </div>
    <div class="fg"><label>今日の様子（複数選択OK）</label>
      <div class="mood-wrap" id="mood-wrap">
        <button class="mood-tag" onclick="togMood(this,'穏やか')">穏やか</button>
        <button class="mood-tag" onclick="togMood(this,'不安定')">不安定</button>
        <button class="mood-tag" onclick="togMood(this,'引きこもり気味')">引きこもり気味</button>
        <button class="mood-tag" onclick="togMood(this,'少し外に出た')">少し外に出た</button>
        <button class="mood-tag" onclick="togMood(this,'笑顔があった')">笑顔があった</button>
        <button class="mood-tag" onclick="togMood(this,'泣いていた')">泣いていた</button>
        <button class="mood-tag" onclick="togMood(this,'話してくれた')">話してくれた</button>
        <button class="mood-tag" onclick="togMood(this,'沈黙が多かった')">沈黙が多かった</button>
        <button class="mood-tag" onclick="togMood(this,'ゲームに集中')">ゲームに集中</button>
        <button class="mood-tag" onclick="togMood(this,'食欲があった')">食欲があった</button>
      </div>
    </div>
  </div>

  <div class="dekita-box">
    <div class="dekita-label">✦ 今日できたこと・よかったこと</div>
    <div class="dekita-chips" id="dekita-chips">
      <button class="dekita-chip" onclick="togDekita(this,'起きられた')">起きられた</button>
      <button class="dekita-chip" onclick="togDekita(this,'食事ができた')">食事ができた</button>
      <button class="dekita-chip" onclick="togDekita(this,'着替えられた')">着替えられた</button>
      <button class="dekita-chip" onclick="togDekita(this,'外に出た')">外に出た</button>
      <button class="dekita-chip" onclick="togDekita(this,'勉強した')">勉強した</button>
      <button class="dekita-chip" onclick="togDekita(this,'好きなことをした')">好きなことをした</button>
      <button class="dekita-chip" onclick="togDekita(this,'会話があった')">会話があった</button>
      <button class="dekita-chip" onclick="togDekita(this,'自分から動いた')">自分から動いた</button>
      <button class="dekita-chip" onclick="togDekita(this,'夜に眠れた')">夜に眠れた</button>
    </div>
    <div class="fg"><label>ほかにできたこと・気づいた小さな変化</label>
      <textarea id="dekita-free" placeholder="どんな小さなことでも。「昨日より少し話してくれた」でも十分です"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-tag">学習活動</div>
    <div class="fg-row">
      <div class="fg"><label>学習場所</label>
        <select id="spl">
          <option value="">選択</option>
          <option>自宅</option>
          <option>教育支援センター</option>
          <option>フリースクール</option>
          <option>学校（別室）</option>
          <option>オンライン授業</option>
          <option>図書館</option>
          <option>その他</option>
        </select>
      </div>
      <div class="fg"><label>学習時間（分）</label>
        <input type="number" id="stm" placeholder="例：30" min="0" max="600">
      </div>
    </div>
    <div class="fg"><label>学習内容</label>
      <input type="text" id="sct" placeholder="例：算数の動画、読書、工作、YouTube学習">
    </div>
    <div class="fg"><label>子ども自身の言葉・振り返り</label>
      <textarea id="crefl" placeholder="「わかった」「つかれた」など本人の言葉をそのまま残す"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-tag">学校・施設との連絡</div>
    <div class="fg-row">
      <div class="fg"><label>連絡先</label>
        <select id="cwho">
          <option value="">なし</option>
          <option>担任</option>
          <option>教頭・校長</option>
          <option>スクールカウンセラー</option>
          <option>教育支援センター</option>
          <option>フリースクール</option>
          <option>その他</option>
        </select>
      </div>
      <div class="fg"><label>連絡方法</label>
        <select id="chow">
          <option value="">—</option>
          <option>電話</option>
          <option>連絡帳</option>
          <option>メール</option>
          <option>LINE</option>
          <option>対面</option>
        </select>
      </div>
    </div>
    <div class="fg"><label>内容・伝えたこと・言われたこと</label>
      <textarea id="cnote" placeholder="記録しておきたいやりとりを自由に"></textarea>
    </div>
  </div>

  <button class="btn-save" onclick="saveEntry()">この日の記録を保存</button>
</div>
</section>

<!-- ═══════════════ PAGE: 一覧 ═══════════════ -->
<section class="page" id="pg-list">
<div class="wrap">
  <div class="ph">
    <div class="ph-title">記録一覧</div>
    <div class="ph-sub" id="list-sub"></div>
  </div>
  <div class="stats-row" id="stats-row"></div>
  <div id="entry-list"></div>
</div>
</section>

<!-- ═══════════════ PAGE: 共有・送る ═══════════════ -->
<section class="page" id="pg-share">
<div class="wrap">
  <div class="ph">
    <div class="ph-title">LINE・メールで送る</div>
    <div class="ph-sub">1日の記録を画像にして共有できます</div>
  </div>

  <div class="card">
    <div class="card-tag">送る記録を選ぶ</div>
    <div class="fg"><label>日付</label>
      <select id="share-date-sel"></select>
    </div>
    <div class="fg"><label>宛先メモ（任意）</label>
      <input type="text" id="share-dest" placeholder="例：田中先生へ・〇〇フリースクール">
    </div>
    <div class="fg"><label>お子さんの名前（任意）</label>
      <input type="text" id="share-name" placeholder="例：花子">
    </div>
    <button class="btn-save" onclick="genShareCard()">カード画像を生成</button>
  </div>

  <div id="share-result" style="display:none">
    <div class="share-preview" id="share-preview-area">
      <img id="share-img" src="" alt="生成された記録カード">
    </div>
    <div class="share-btns">
      <button class="share-btn share-btn-dl" onclick="dlCard()">📥 保存</button>
      <button class="share-btn share-btn-copy" onclick="copyCard()">📋 コピー</button>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-top:10px;text-align:center">
      画像を長押し→保存して、LINEやメールに添付してください
    </p>
  </div>
</div>
</section>

<!-- ═══════════════ PAGE: レポート ═══════════════ -->
<section class="page" id="pg-report">
<div class="wrap">
  <div class="ph">
    <div class="ph-title">まとめレポート</div>
    <div class="ph-sub">期間をまとめて印刷・提出用に</div>
  </div>
  <div class="card">
    <div class="card-tag">レポート設定</div>
    <div class="fg"><label>お子さんの名前</label><input type="text" id="rp-name" placeholder="例：田中 花子"></div>
    <div class="fg"><label>提出先</label><input type="text" id="rp-dest" placeholder="例：〇〇小学校 担任"></div>
    <div class="fg-row">
      <div class="fg"><label>期間 開始</label><input type="date" id="rp-from"></div>
      <div class="fg"><label>期間 終了</label><input type="date" id="rp-to"></div>
    </div>
    <button class="btn-save" onclick="genReport()">レポートを生成</button>
  </div>
  <div id="rp-area"></div>
  <div id="rp-print-btn" style="display:none;margin-top:-8px">
    <button class="btn-outline" style="width:100%" onclick="window.print()">印刷 / PDF保存</button>
  </div>
</div>
</section>

<!-- bottom nav -->
<nav class="bnav">
  <button class="bnav-btn active" onclick="goPage('rec',this)"><span class="bnav-icon">✏️</span>記録</button>
  <button class="bnav-btn" onclick="goPage('list',this)"><span class="bnav-icon">📋</span>一覧</button>
  <button class="bnav-btn" onclick="goPage('share',this)"><span class="bnav-icon">📤</span>送る</button>
  <button class="bnav-btn" onclick="goPage('report',this)"><span class="bnav-icon">📄</span>レポート</button>
</nav>

<!-- detail modal -->
<div class="overlay" id="overlay" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-inner" id="sheet-inner"></div>
  </div>
</div>

<!-- off-screen share card canvas -->
<div class="share-card-wrap" id="sc-wrap">
  <div class="share-card" id="share-card"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='tsunagari_v2';
let entries=[],selCond_=0,selMoods=[],selDekita=[];

function load(){try{entries=JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){entries=[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(entries))}

function goPage(p,btn){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('pg-'+p).classList.add('active');
  btn.classList.add('active');
  if(p==='list')renderList();
  if(p==='share')renderShareDateSel();
}

const WEEKDAY=['日','月','火','水','木','金','土'];
function fmtDate(d){
  if(!d)return'';
  const dt=new Date(d+'T00:00:00');
  return`${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日（${WEEKDAY[dt.getDay()]}）`;
}
function fmtShort(d){
  if(!d)return'';
  const dt=new Date(d+'T00:00:00');
  return`${dt.getMonth()+1}/${dt.getDate()}（${WEEKDAY[dt.getDay()]}）`;
}
const COND_LABEL=['','つらい','しんどい','まあまあ','いい感じ','元気'];
const COND_EMOJI=['','😞','😟','😐','🙂','😄'];
const COND_COLOR=['','#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db'];
const COND_CLASS=['','cc1','cc2','cc3','cc4','cc5'];

function initUI(){
  const now=new Date();
  const today=now.toISOString().split('T')[0];
  const w=WEEKDAY[now.getDay()];
  document.getElementById('hdr-date').textContent=`${now.getMonth()+1}/${now.getDate()}（${w}）`;
  document.getElementById('rec-date-sub').textContent=fmtDate(today);
  const m=new Date();m.setDate(m.getDate()-30);
  document.getElementById('rp-from').value=m.toISOString().split('T')[0];
  document.getElementById('rp-to').value=today;
}

function selCond(v){
  selCond_=v;
  document.querySelectorAll('.cond-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelector(`.cond-btn[data-v="${v}"]`).classList.add('sel');
  document.getElementById('cond-lbl').textContent=COND_LABEL[v];
}
function togMood(btn,m){
  btn.classList.toggle('sel');
  selMoods=selMoods.includes(m)?selMoods.filter(x=>x!==m):[...selMoods,m];
}
function togDekita(btn,d){
  btn.classList.toggle('sel');
  selDekita=selDekita.includes(d)?selDekita.filter(x=>x!==d):[...selDekita,d];
}

function saveEntry(){
  const today=new Date().toISOString().split('T')[0];
  const e={
    id:Date.now(),date:today,
    cond:selCond_,moods:[...selMoods],dekita:[...selDekita],
    dekitaFree:document.getElementById('dekita-free').value.trim(),
    spl:document.getElementById('spl').value,
    stm:document.getElementById('stm').value,
    sct:document.getElementById('sct').value.trim(),
    crefl:document.getElementById('crefl').value.trim(),
    cwho:document.getElementById('cwho').value,
    chow:document.getElementById('chow').value,
    cnote:document.getElementById('cnote').value.trim(),
  };
  if(!e.cond&&!e.moods.length&&!e.dekita.length&&!e.sct&&!e.dekitaFree){
    toast('何か一つ記録してから保存してください');return;
  }
  const idx=entries.findIndex(x=>x.date===today);
  if(idx>=0)entries[idx]=e;else entries.unshift(e);
  save();toast('保存しました ✓');resetForm();
}

function resetForm(){
  selCond_=0;selMoods=[];selDekita=[];
  document.querySelectorAll('.cond-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.mood-tag').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.dekita-chip').forEach(b=>b.classList.remove('sel'));
  document.getElementById('cond-lbl').textContent='';
  ['dekita-free','spl','stm','sct','crefl','cwho','chow','cnote'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
}

/* ── LIST ── */
function renderList(){
  load();
  const el=document.getElementById('entry-list');
  const sub=document.getElementById('list-sub');
  const srow=document.getElementById('stats-row');
  sub.textContent=entries.length+'件の記録';
  const totalStudy=entries.reduce((s,e)=>s+(parseInt(e.stm)||0),0);
  const studyDays=entries.filter(e=>e.sct).length;
  const contactDays=entries.filter(e=>e.cwho).length;
  srow.innerHTML=`
    <div class="stat"><div class="stat-n">${entries.length}</div><div class="stat-l">記録日数</div></div>
    <div class="stat"><div class="stat-n">${studyDays}</div><div class="stat-l">学習した日</div></div>
    <div class="stat"><div class="stat-n">${contactDays}</div><div class="stat-l">連絡した日</div></div>
  `;
  if(!entries.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div>まだ記録がありません</div></div>`;return;
  }
  el.innerHTML=entries.map(e=>`
    <div class="entry" onclick="openDetail(${e.id})">
      <div class="entry-top">
        <span class="entry-date-str">
          ${e.cond?`<span class="cdot ${COND_CLASS[e.cond]}"></span>`:''}
          ${fmtShort(e.date)}
        </span>
        <div class="entry-pills">
          ${e.dekita&&e.dekita.length?`<span class="epill epill-green">できた×${e.dekita.length}</span>`:''}
          ${e.sct?`<span class="epill epill-terra">${e.spl||'学習あり'}</span>`:''}
          ${e.cwho?`<span class="epill epill-navy">${e.cwho}</span>`:''}
        </div>
      </div>
      <div class="entry-preview">${[e.moods.join('・'),e.dekita.join('・'),e.dekitaFree,e.sct].filter(Boolean).join('　')||'（記録あり）'}</div>
    </div>
  `).join('');
}

function openDetail(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  document.getElementById('sheet-inner').innerHTML=`
    <div class="sheet-head">
      <span class="sheet-title">${fmtDate(e.date)}</span>
      <button class="sheet-close" onclick="closeSheetBtn()">✕</button>
    </div>
    ${e.cond?`<div class="mf"><div class="mf-l">体調</div><div class="mf-v">${COND_EMOJI[e.cond]} ${COND_LABEL[e.cond]}</div></div>`:''}
    ${e.moods&&e.moods.length?`<div class="mf"><div class="mf-l">様子</div><div class="mf-v">${e.moods.join('　')}</div></div>`:''}
    ${e.dekita&&e.dekita.length?`<div class="mf"><div class="mf-l">できたこと</div><div class="mf-v">${e.dekita.join('　')}</div></div>`:''}
    ${e.dekitaFree?`<div class="mf"><div class="mf-l">小さな変化</div><div class="mf-v">${e.dekitaFree}</div></div>`:''}
    ${e.sct?`<div class="mf"><div class="mf-l">学習活動</div><div class="mf-v">${[e.spl,e.stm?e.stm+'分':'',e.sct].filter(Boolean).join('　')}</div></div>`:''}
    ${e.crefl?`<div class="mf"><div class="mf-l">子どもの言葉</div><div class="mf-v">${e.crefl}</div></div>`:''}
    ${e.cwho?`<div class="mf"><div class="mf-l">連絡</div><div class="mf-v">${[e.cwho,e.chow,e.cnote].filter(Boolean).join('　')}</div></div>`:''}
    <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
      <button class="btn-sm" onclick="jumpToShare('${e.date}')">📤 この日を送る</button>
      <button class="del-btn" onclick="deleteEntry(${e.id})">削除</button>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
}
function closeSheet(ev){if(ev.target===document.getElementById('overlay'))closeSheetBtn()}
function closeSheetBtn(){document.getElementById('overlay').classList.remove('open')}

function jumpToShare(date){
  closeSheetBtn();
  goPage('share',document.querySelectorAll('.bnav-btn')[2]);
  setTimeout(()=>{
    const sel=document.getElementById('share-date-sel');
    if(sel)sel.value=date;
  },100);
}

function deleteEntry(id){
  if(!confirm('この記録を削除しますか？'))return;
  entries=entries.filter(e=>e.id!==id);
  save();closeSheetBtn();renderList();toast('削除しました');
}

/* ── SHARE ── */
function renderShareDateSel(){
  load();
  const sel=document.getElementById('share-date-sel');
  sel.innerHTML=entries.length
    ?entries.map(e=>`<option value="${e.date}">${fmtShort(e.date)}${e.cond?' '+COND_EMOJI[e.cond]:''}</option>`).join('')
    :'<option value="">記録がありません</option>';
}

function buildShareCardHTML(e,dest,childName){
  const condStr=e.cond?`${COND_EMOJI[e.cond]} ${COND_LABEL[e.cond]}`:'未入力';
  const moodsStr=e.moods&&e.moods.length?e.moods.join('　'):'—';
  const dekitaChips=e.dekita&&e.dekita.length
    ?e.dekita.map(d=>`<span class="sc-chip sc-chip-green">${d}</span>`).join(''):'';
  const dekitaFreeStr=e.dekitaFree||'';
  const studyStr=[e.spl,e.stm?e.stm+'分':'',e.sct].filter(Boolean).join('　')||'—';
  const reflStr=e.crefl||'';
  const contactStr=e.cwho?[e.cwho,e.chow,e.cnote].filter(Boolean).join('　'):'連絡なし';
  const nameStr=childName?`${childName} の記録`:'今日の記録';
  const destStr=dest?`${dest} へ`:'';

  return`<div class="share-card" style="width:600px;background:#faf7f2;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;">
  <div class="sc-header">
    <div><div class="sc-brand">SURVIVAL_MAM / つながりログ</div><div class="sc-title">${nameStr}</div></div>
    <div class="sc-dateblock"><div class="sc-date">${fmtDate(e.date)}</div><div class="sc-day">${destStr}</div></div>
  </div>
  <div class="sc-body">
    <div class="sc-section">
      <div class="sc-sec-label">体調・様子</div>
      <div class="sc-row"><span class="sc-row-l">体調レベル</span><span class="sc-row-v">${condStr}</span></div>
      <div class="sc-row"><span class="sc-row-l">今日の様子</span><span class="sc-row-v">${moodsStr}</span></div>
    </div>
    ${dekitaChips||dekitaFreeStr?`<div class="sc-section">
      <div class="sc-sec-label">今日できたこと</div>
      ${dekitaChips?`<div class="sc-chips" style="margin-bottom:${dekitaFreeStr?'10px':'0'}">${dekitaChips}</div>`:''}
      ${dekitaFreeStr?`<div class="sc-text">${dekitaFreeStr}</div>`:''}
    </div>`:''}
    <div class="sc-section">
      <div class="sc-sec-label">学習活動</div>
      <div class="sc-row"><span class="sc-row-l">内容・場所・時間</span><span class="sc-row-v">${studyStr}</span></div>
      ${reflStr?`<div style="margin-top:6px"><div style="font-size:10px;color:#a86030;margin-bottom:4px">子どもの振り返り</div><div class="sc-text">"${reflStr}"</div></div>`:''}
    </div>
    <div class="sc-section">
      <div class="sc-sec-label">学校・施設との連絡</div>
      <div class="sc-text">${contactStr}</div>
    </div>
  </div>
  <div class="sc-footer">
    <span class="sc-footer-l">つながりログ — 不登校連携記録アプリ</span>
    <span class="sc-footer-r">survival_mam</span>
  </div>
</div>`;
}

function genShareCard(){
  load();
  const dateVal=document.getElementById('share-date-sel').value;
  const dest=document.getElementById('share-dest').value.trim();
  const name=document.getElementById('share-name').value.trim();
  if(!dateVal){toast('記録がありません');return}
  const e=entries.find(x=>x.date===dateVal);
  if(!e){toast('この日の記録が見つかりません');return}

  const wrap=document.getElementById('sc-wrap');
  wrap.style.position='absolute';wrap.style.left='-9999px';wrap.style.top='0';
  wrap.style.height='auto';wrap.style.overflow='visible';
  wrap.innerHTML=buildShareCardHTML(e,dest,name);

  const card=wrap.querySelector('.share-card');
  setTimeout(()=>{
    html2canvas(card,{scale:2,useCORS:true,backgroundColor:'#faf7f2'}).then(canvas=>{
      const imgURL=canvas.toDataURL('image/png');
      document.getElementById('share-img').src=imgURL;
      document.getElementById('share-result').style.display='block';
      wrap.style.height='0';wrap.style.overflow='hidden';
      toast('画像を生成しました');
    }).catch(()=>toast('生成に失敗しました'));
  },200);
}

function dlCard(){
  const img=document.getElementById('share-img');
  if(!img.src||img.src==='')return;
  const a=document.createElement('a');
  a.href=img.src;a.download=`tsunagari_log_${new Date().toISOString().split('T')[0]}.png`;
  a.click();toast('画像を保存しました');
}

async function copyCard(){
  const img=document.getElementById('share-img');
  if(!img.src)return;
  try{
    const res=await fetch(img.src);const blob=await res.blob();
    await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    toast('クリップボードにコピーしました');
  }catch(e){toast('長押しで画像を保存してください')}
}

/* ── REPORT ── */
function genReport(){
  load();
  const name=document.getElementById('rp-name').value.trim()||'お子さん';
  const dest=document.getElementById('rp-dest').value.trim()||'提出先';
  const from=document.getElementById('rp-from').value;
  const to=document.getElementById('rp-to').value;
  const today=new Date().toISOString().split('T')[0];
  let filtered=[...entries];
  if(from)filtered=filtered.filter(e=>e.date>=from);
  if(to)filtered=filtered.filter(e=>e.date<=to);
  filtered.sort((a,b)=>a.date.localeCompare(b.date));
  const period=from&&to?`${fmtDate(from)}〜${fmtDate(to)}`:'全期間';
  const totalMin=filtered.reduce((s,e)=>s+(parseInt(e.stm)||0),0);
  const studyDays=filtered.filter(e=>e.sct).length;
  const contactDays=filtered.filter(e=>e.cwho).length;
  const dekitaTotal=filtered.reduce((s,e)=>s+(e.dekita?e.dekita.length:0),0);

  const placeMap={};
  filtered.forEach(e=>{if(e.spl)placeMap[e.spl]=(placeMap[e.spl]||0)+1});
  const placeStr=Object.entries(placeMap).map(([k,v])=>`${k}：${v}日`).join('／')||'—';

  const blocks=filtered.filter(e=>e.sct||e.dekitaFree||e.dekita&&e.dekita.length||e.cwho).map(e=>`
    <div style="border-left:3px solid #e8c4a0;padding:10px 14px;margin-bottom:10px;background:#faf7f2;border-radius:0 8px 8px 0">
      <div style="font-size:12px;color:#a86030;font-weight:500;margin-bottom:5px">${fmtDate(e.date)}　${e.cond?COND_EMOJI[e.cond]+' '+COND_LABEL[e.cond]:''}</div>
      <div style="font-size:13px;color:#2a1f16;line-height:1.7">
        ${e.dekita&&e.dekita.length?`<b>できたこと：</b>${e.dekita.join('・')}${e.dekitaFree?'　'+e.dekitaFree:''}<br>`:''}
        ${e.sct?`<b>学習：</b>${[e.spl,e.stm?e.stm+'分':'',e.sct].filter(Boolean).join('　')}<br>`:''}
        ${e.crefl?`<b>本人の言葉：</b>"${e.crefl}"<br>`:''}
        ${e.cwho?`<b>連絡：</b>${[e.cwho,e.chow,e.cnote].filter(Boolean).join('　')}`:''}
      </div>
    </div>
  `).join('');

  document.getElementById('rp-area').innerHTML=`
    <div style="background:#fff;border:1px solid #e8e0d4;border-radius:16px;padding:24px;margin-bottom:14px">
      <div style="font-size:10px;color:#c4814a;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">SURVIVAL_MAM / つながりログ</div>
      <div style="font-size:19px;font-weight:500;color:#1a1410;margin-bottom:2px">${name} の活動記録</div>
      <div style="font-size:13px;color:#9a8070;margin-bottom:18px">期間：${period}　提出先：${dest}　作成：${fmtDate(today)}</div>
      <hr style="border:none;border-top:1px solid #e8e0d4;margin-bottom:16px">
      <div style="font-size:11px;color:#a86030;letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:10px">概要</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        <div style="background:#faf7f2;border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:500;color:#c4814a">${filtered.length}</div><div style="font-size:11px;color:#9a8070">記録日数</div></div>
        <div style="background:#faf7f2;border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:500;color:#c4814a">${studyDays}</div><div style="font-size:11px;color:#9a8070">学習した日</div></div>
        <div style="background:#faf7f2;border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:500;color:#5a8a5a">${dekitaTotal}</div><div style="font-size:11px;color:#9a8070">できたこと合計</div></div>
        <div style="background:#faf7f2;border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:500;color:#c4814a">${contactDays}</div><div style="font-size:11px;color:#9a8070">連絡した日</div></div>
      </div>
      <div style="font-size:13px;color:#5a4538;margin-bottom:16px">学習合計：${Math.round(totalMin/60*10)/10}時間（${totalMin}分）　学習場所：${placeStr}</div>
      <hr style="border:none;border-top:1px solid #e8e0d4;margin-bottom:14px">
      <div style="font-size:11px;color:#a86030;letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:10px">日別記録</div>
      ${blocks||'<p style="color:#9a8070;font-size:13px">対象期間の記録がありません</p>'}
      <div style="font-size:11px;color:#9a8070;text-align:center;margin-top:16px;padding-top:14px;border-top:1px solid #e8e0d4">本記録は保護者が「つながりログ」にて作成しました</div>
    </div>
  `;
  document.getElementById('rp-print-btn').style.display='block';
  toast('レポートを生成しました');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

load();initUI();
</script>
</body>
</html>
